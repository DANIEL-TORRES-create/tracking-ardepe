<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Panel de Control de Viajes</title> 
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos_addins3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="header-container">
    <h1 class="neon-title">Tablero de Control de Viajes</h1>
    <div class="nav-shortcuts">
        </div>
</div>

<div class="dashboard">
    <table class="monitor-table">
        <thead>
            <tr>
                <th>UNIDAD / CONDUCTOR</th>
                <th>RUTA</th>
                <th>ORIGEN / DESTINO</th>
                <th>SALIDA REAL</th>
                <th>LLEGADA EST.</th>
                <th>PROGRESO</th>
                <th style="text-align:center;">CONTROL DEL VIAJE</th>
                <th style="text-align:center;">VISTAS</th>
            </tr>
        </thead>
        <tbody id="lista-viajes">
            <tr><td colspan="8" style="text-align:center; padding:40px;">Sincronizando flota activa...</td></tr>
        </tbody>
    </table>
</div>

<div id="side-panel">
    <div class="side-panel-header">
        <div class="header-left-box">
            <small id="side-placa" style="color:#444; font-weight:bold; font-size:14px; text-transform:uppercase;">Placa: </small>
        </div>
        
        <div class="header-center-box">
            <h2 style="margin:0; font-weight:800; color:var(--primary); font-size:18px; text-transform:uppercase; letter-spacing:0.5px;">Resumen de Viaje</h2>
        </div>
        
        <div class="header-right-box">
            <button onclick="cerrarPanel()" class="btn-close-panel" title="Cerrar Vista">&times;</button>
        </div>
    </div>
    
    <div id="timeline-v" class="timeline-v-container"></div>
</div>

<div id="modal-cancel" class="modal-full-bg" style="display:none;">
    <div class="modal-content">
        <h3 id="modal-accion-titulo">Confirmar Acción</h3>
        <p>Indique motivo (Mín. 10 caracteres):</p>
        <textarea id="motivo-txt" oninput="validarMotivo()" placeholder="Escriba el motivo de la intervención manual..."></textarea>
        <div style="text-align:right; margin-top:15px;">
            <button onclick="cerrarModal()" class="btn-secundario">Salir</button>
            <button id="btn-confirmar" disabled onclick="ejecutarAccionManual()" class="btn-primario">Confirmar</button>
        </div>
    </div>
</div>

<script>
    // URL DE TU SCRIPT (Asegúrate de que sea la última versión desplegada)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwUUfNbaq4tkx05vUxjpJNtbxqJi_Q9WWnxMINupHHSWpU129H9x5wY6Jbf0SNrEE0e/exec"; 
    
    let _usuarioLogueado = "Monitor";
    let _viajeSeleccionado = null;
    let _tipoAccionManual = "";

    // 1. FUNCIÓN DE REFRESCO DE DATOS
    function actualizar() {
    const script = document.createElement('script');
    // Usamos concatenación simple para evitar errores de símbolos
    script.src = WEB_APP_URL + "?read=viajes&callback=renderizar&nocache=" + new Date().getTime();
    document.body.appendChild(script);
    script.onload = function() { script.remove(); };
}

    // 2. RENDERIZADO DE LA TABLA
    window.renderizar = function(viajes) {
        const tbody = document.getElementById('lista-viajes');
        if (!tbody) return;
        tbody.innerHTML = "";
        
        if (!viajes || viajes.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px;">No hay viajes activos en este momento.</td></tr>';
            return;
        }

        // ====================================================================
        // MEJORA INTERNA: ORDENAR CRONOLÓGICAMENTE DE MENOR A MAYOR POR SALIDA
        // ====================================================================
        viajes.sort((a, b) => {
            let horaA = a.salidaReal || "";
            let horaB = b.salidaReal || "";
            if (horaA < horaB) return -1;
            if (horaA > horaB) return 1;
            return 0;
        });

        viajes.forEach(v => {
            const estaEnCurso = (v.estado === "EN CURSO");
            
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b>${v.placa}</b><br><small style="color:#777">${v.conductor}</small></td>
                <td><small>${v.ruta}</small></td>
                <td><i class="fas fa-map-marker-alt" style="color:var(--primary)"></i> ${v.origen}<br><i class="fas fa-flag-checkered"></i> ${v.destino}</td>
                <td style="color:black; font-weight:bold;">${v.salidaReal}</td>
                <td style="font-weight:bold;">${v.llegadaEstimada}</td>
                <td>
                    <div class="segment-bar">
                        ${Array.from({length:10}, (_,i) => `<div class="segment ${i < (v.progreso/10) ? 'active' : ''}"></div>`).join('')}
                    </div>
                    <small style="font-size:10px; font-weight:bold; color:var(--primary)">${v.progreso}% completado</small>
                </td>
                <td class="control-cell">
                    <button class="btn-ctrl ${estaEnCurso ? 'disabled' : ''}" title="Iniciar Viaje" onclick="${estaEnCurso ? '' : `prepararAccion('${v.idViaje}', 'INICIAR')`}">
                        <i class="fas fa-play-circle"></i>
                    </button>
                    <button class="btn-ctrl" title="Finalizar Viaje" onclick="prepararAccion('${v.idViaje}', 'FINALIZAR')">
                        <i class="fas fa-check-circle" style="color:var(--success)"></i>
                    </button>
                    <button class="btn-ctrl" title="Cancelar Viaje" onclick="prepararAccion('${v.idViaje}', 'CANCELAR')">
                        <i class="fas fa-ban" style="color:var(--danger)"></i>
                    </button>
                </td>
                <td class="vistas-cell">
                    <button class="btn-vista" title="Ver Resumen de Ruta" onclick="abrirResumen('${encodeURIComponent(v.itinerarioFull)}', '${v.placa}', '${encodeURIComponent(v.auditoriaLog)}')">
                        <i class="fas fa-stream"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 3. LÓGICA DE MODALES Y ACCIONES
    function prepararAccion(id, tipo) {
        _viajeSeleccionado = id;
        _tipoAccionManual = tipo;
        
        // Limpiamos el modal antes de abrirlo
        document.getElementById('motivo-txt').value = "";
        document.getElementById('btn-confirmar').disabled = true;
        document.getElementById('btn-confirmar').innerHTML = "Confirmar";
        
        // Ajustamos dinámicamente el estilo del botón según la acción
        const btnConfirmar = document.getElementById('btn-confirmar');
        btnConfirmar.className = ""; // Limpiar clases previas
        if (tipo === "INICIAR") btnConfirmar.classList.add("btn-primario", "bg-iniciar");
        if (tipo === "FINALIZAR") btnConfirmar.classList.add("btn-primario", "bg-finalizar");
        if (tipo === "CANCELAR") btnConfirmar.classList.add("btn-primario", "bg-cancelar");

        document.getElementById('modal-accion-titulo').innerText = "CONFIRMAR " + tipo;
        document.getElementById('modal-cancel').style.display = 'flex';
    }

    function ejecutarAccionManual() {
        const btn = document.getElementById('btn-confirmar');
        const motivo = document.getElementById('motivo-txt').value;
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';

        fetch(`${WEB_APP_URL}?action=manual&id=${_viajeSeleccionado}&tipo=${_tipoAccionManual}&motivo=${encodeURIComponent(motivo)}&user=${_usuarioLogueado}`)
        .then(response => response.json())
        .then(res => {
            if (res.success) {
                cerrarModal();
                actualizar(); // Refresco inmediato para ver el cambio
            } else {
                alert("Error: " + res.error);
                btn.disabled = false;
                btn.innerHTML = "Confirmar";
            }
        })
        .catch(err => {
            alert("Error de conexión");
            btn.disabled = false;
            btn.innerHTML = "Confirmar";
        });
    }

    // 4. LÓGICA DEL PANEL LATERAL (RESUMEN)
    function abrirResumen(data, placa, logAuditoria) {
        // ====================================================================
        // EFECTO VISUAL: MARCAR FILA ACTIVA EN LA TABLA PRINCIPAL (LÍNEA ROJA)
        // ====================================================================
        // 1. Quitamos la marca roja a cualquier otra fila previamente seleccionada
        document.querySelectorAll('#lista-viajes tr').forEach(tr => tr.classList.remove('fila-activa'));
        
        // 2. Detectamos el botón presionado y encuadramos su fila (TR) en rojo oscuro
        if (typeof event !== 'undefined' && event.currentTarget) {
            const botonActivo = event.currentTarget;
            if (botonActivo.closest('tr')) {
                botonActivo.closest('tr').classList.add('fila-activa');
            }
        }

        // ====================================================================
        // PROCESAMIENTO DE DATOS ENTRANTES
        // ====================================================================
        let puntos = JSON.parse(decodeURIComponent(data));
        const rawLog = decodeURIComponent(logAuditoria);
        
        // Inyectamos el número de unidad en la cabecera (La alineación se controla por CSS)
        document.getElementById('side-placa').innerText = "Placa: " + placa;
        
        const timeline = document.getElementById('timeline-v');
        timeline.innerHTML = "";
        
        // ====================================================================
        // 1. RENDERIZADO DE COMENTARIOS DE AUDITORÍA SUPERIOR (CAJA AMARILLA)
        // ====================================================================
        if (rawLog && rawLog !== "undefined" && rawLog !== "null" && rawLog.trim() !== "") {
            let logsHtml = `<div class="auditoria-panel-box">`;
            let partesLog = rawLog.split(" / ");
            partesLog.forEach(log => {
                if (log.includes("INICIO")) {
                    logsHtml += `<p style="margin:4px 0; color:#b58105;"><i class="fas fa-play" style="margin-right:6px;"></i> <b>Auditoría Inicio:</b> ${log}</p>`;
                } else if (log.includes("FIN") || log.includes("CANCELADO")) {
                    let icono = log.includes("CANCELADO") ? "fa-ban" : "fa-flag-checkered";
                    let etiqueta = log.includes("CANCELADO") ? "Auditoría Cancelar:" : "Auditoría Fin:";
                    logsHtml += `<p style="margin:4px 0; color:#004b93;"><i class="fas ${icono}" style="margin-right:6px;"></i> <b>${etiqueta}</b> ${log}</p>`;
                } else {
                    logsHtml += `<p style="margin:4px 0;"><i class="fas fa-user-edit" style="margin-right:6px;"></i> <b>Nota:</b> ${log}</p>`;
                }
            });
            logsHtml += `</div>`;
            timeline.innerHTML += logsHtml;
        }

        // ====================================================================
        // 2. REUBICACIÓN LÓGICA E INTELIGENTE DEL INICIO_MANUAL
        // ====================================================================
        let indiceInicioManual = puntos.findIndex(p => p.punto === "INICIO_MANUAL");
        if (indiceInicioManual > -1) {
            let [inicioManualNode] = puntos.splice(indiceInicioManual, 1); 
            // Lo insertamos en la segunda posición, justo debajo del origen (Cochera)
            puntos.splice(1, 0, inicioManualNode);
        }

        // ====================================================================
        // 3. GENERACIÓN DINÁMICA DE TARJETAS (CARDS VISUALES)
        // ====================================================================
        let containerHtml = `<div class="timeline-cards-container">`;
        
        puntos.forEach((p, index) => {
            let esCompletado = (p.deteccion === "SI" || p.deteccion === "FORZADO");
            let esInicioManual = (p.punto === "INICIO_MANUAL");
            
            // Asignación de iconos temáticos operativos
            let iconoHito = "fa-map-marker-alt"; 
            if (index === 0) iconoHito = "fa-warehouse"; 
            if (index === puntos.length - 1) iconoHito = "fa-flag-checkered"; 
            if (esInicioManual) iconoHito = "fa-play-circle";

            // Clases de estado para los nodos circulares
            let claseEstado = "pending";
            if (p.deteccion === "SI") claseEstado = "done";
            if (p.deteccion === "FORZADO" || esInicioManual) claseEstado = "forced";

            // Cálculo para determinar el color y estilo de la línea conectora
            let sigPunto = puntos[index + 1];
            let lineaClase = "line-pending";
            if (esCompletado && sigPunto && (sigPunto.deteccion === "SI" || sigPunto.deteccion === "FORZADO")) {
                lineaClase = "line-done"; 
            }

            containerHtml += `
                <div class="timeline-card-wrapper ${claseEstado}">
                    <div class="timeline-node">
                        <i class="fas ${iconoHito}"></i>
                    </div>
                    
                    ${index < puntos.length - 1 ? `<div class="timeline-connector-line ${lineaClase}"></div>` : ''}
                    
                    <div class="timeline-card">
                        <div class="card-header-point">${p.punto}</div>
                        <div class="card-body-times">
                            <div><i class="far fa-clock"></i> Plan: <span>${p.planHora}</span></div>
                            <div class="time-real"><i class="fas fa-satellite-dish"></i> Real: <span>${p.realHora}</span></div>
                        </div>
                    </div>
                </div>
            `;
        });

        containerHtml += `</div>`;
        timeline.innerHTML += containerHtml;
        
        // Abrimos el panel lateral deslizándolo en pantalla
        document.getElementById('side-panel').classList.add('open');
    }

    // 5. UTILIDADES
    function cerrarModal() { 
        document.getElementById('modal-cancel').style.display = 'none'; 
        document.getElementById('motivo-txt').value = ""; 
        document.getElementById('btn-confirmar').disabled = true;
    }
    
    function cerrarPanel() { document.getElementById('side-panel').classList.remove('open'); 
        // Al cerrar el panel, le quitamos la marca roja a la fila de la tabla
        document.querySelectorAll('#lista-viajes tr').forEach(tr => tr.classList.remove('fila-activa'));
    }
    
    function validarMotivo() { 
        const txt = document.getElementById('motivo-txt').value.trim();
        document.getElementById('btn-confirmar').disabled = (txt.length < 10); 
    }

    // 6. INTEGRACIÓN CON GEOTAB (API)
    geotab.addin.seguimiento = () => {
        return {
            initialize(api, state, callback) {
                // Obtener usuario real de Geotab
                api.getSession(s => { _usuarioLogueado = s.userName; });
                
                // Carga inicial y auto-refresco cada 1 minuto
                actualizar();
                setInterval(actualizar, 60000);
                
                callback();
            }
        };
    };

    // Ejecución inicial por si se prueba fuera de Geotab
    actualizar();
</script>
</body>
</html>
