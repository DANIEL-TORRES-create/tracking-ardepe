<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Panel de Control de Viajes</title> 
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos_addins3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="header-container">
    <h1 class="neon-title">PANEL - CONTROL DE VIAJES</h1>
    <div class="nav-shortcuts">
        <button class="btn-nav" onclick="window.location.href='https://DANIEL-TORRES-create.github.io/tracking-ardepe/configurar.html'"><i class="fas fa-cog"></i> Configurar</button>
        <button class="btn-nav" onclick="window.location.href='https://DANIEL-TORRES-create.github.io/tracking-ardepe/programar.html'"><i class="fas fa-calendar-plus"></i> Programar</button>
        <button class="btn-nav" onclick="window.location.href='https://tu-servidor.com/historico.html'"><i class="fas fa-history"></i> Histórico</button>
    </div>
</div>

<div class="dashboard">
    <table class="monitor-table">
        <thead>
            <tr>
                <th>UNIDAD / CONDUCTOR</th>
                <th>RUTA</th>
                <th>ORIGEN / DESTINO</th>
                <th>SALIDA REAL</th>
                <th>LLEGADA EST.</th>
                <th>PROGRESO</th>
                <th style="text-align:center;">CONTROL DEL VIAJE</th>
                <th style="text-align:center;">VISTAS</th>
            </tr>
        </thead>
        <tbody id="lista-viajes">
            <tr><td colspan="8" style="text-align:center; padding:40px;">Cargando flota...</td></tr>
        </tbody>
    </table>
</div>

<div id="side-panel">
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <h2 id="side-placa" style="margin:0;">Resumen</h2>
        <button onclick="cerrarPanel()" style="border:none; background:none; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <div id="timeline-v" style="margin-top:20px;"></div>
</div>

<div id="modal-cancel" class="modal-full-bg" style="display:none;">
    <div class="modal-content">
        <h3 id="modal-accion-titulo">Confirmar Acción</h3>
        <p>Indique motivo (Mín. 10 caracteres):</p>
        <textarea id="motivo-txt" oninput="validarMotivo()" placeholder="Escriba el motivo aquí..."></textarea>
        <div style="text-align:right; margin-top:15px;">
            <button onclick="cerrarModal()" class="btn-secundario">Salir</button>
            <button id="btn-confirmar" disabled onclick="ejecutarAccionManual()" class="btn-primario">Confirmar</button>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "TU_NUEVA_URL_DE_DESPLIEGUE_AQUI"; 
    let _usuarioLogueado = "Monitor";
    let _viajeSeleccionado = null;
    let _tipoAccionManual = "";

    function actualizar() {
        const script = document.createElement('script');
        script.src = `${WEB_APP_URL}?read=viajes&callback=renderizar&v=${Date.now()}`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }

    window.renderizar = function(viajes) {
        const tbody = document.getElementById('lista-viajes');
        tbody.innerHTML = "";
        viajes.forEach(v => {
            const estaEnCurso = (v.estado === "EN CURSO");
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b>${v.placa}</b><br><small>${v.conductor}</small></td>
                <td><small>${v.ruta}</small></td>
                <td>${v.origen}<br>${v.destino}</td>
                <td style="color:black; font-weight:bold;">${v.salidaReal}</td>
                <td style="font-weight:bold;">${v.llegadaEstimada}</td>
                <td>${v.progreso}%</td>
                <td class="control-cell">
                    <button class="btn-ctrl ${estaEnCurso ? 'disabled' : ''}" onclick="${estaEnCurso ? '' : `prepararAccion('${v.idViaje}', 'INICIAR')`}"><i class="fas fa-play"></i></button>
                    <button class="btn-ctrl" onclick="prepararAccion('${v.idViaje}', 'FINALIZAR')"><i class="fas fa-check" style="color:var(--primary)"></i></button>
                    <button class="btn-ctrl" onclick="prepararAccion('${v.idViaje}', 'CANCELAR')"><i class="fas fa-times" style="color:var(--danger)"></i></button>
                </td>
                <td class="vistas-cell">
                    <button class="btn-vista" onclick="abrirResumen('${encodeURIComponent(v.itinerarioFull)}', '${v.placa}')"><i class="fas fa-bars"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function prepararAccion(id, tipo) {
        _viajeSeleccionado = id;
        _tipoAccionManual = tipo;
        document.getElementById('modal-accion-titulo').innerText = tipo + " VIAJE";
        document.getElementById('modal-cancel').style.display = 'flex';
    }

    function ejecutarAccionManual() {
        const btn = document.getElementById('btn-confirmar');
        const motivo = document.getElementById('motivo-txt').value;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';

        fetch(`${WEB_APP_URL}?action=manual&id=${_viajeSeleccionado}&tipo=${_tipoAccionManual}&motivo=${encodeURIComponent(motivo)}&user=${_usuarioLogueado}`)
        .then(() => {
            cerrarModal();
            actualizar(); // AUTO-REFRESH
        });
    }

    function abrirResumen(data, placa) {
        document.getElementById('side-placa').innerText = placa;
        document.getElementById('side-panel').classList.add('open');
        // Lógica simple de timeline
        const puntos = JSON.parse(decodeURIComponent(data));
        document.getElementById('timeline-v').innerHTML = puntos.map(p => `<div>${p.punto}: ${p.realHora}</div>`).join('');
    }

    function cerrarModal() { document.getElementById('modal-cancel').style.display = 'none'; document.getElementById('motivo-txt').value = ""; }
    function cerrarPanel() { document.getElementById('side-panel').classList.remove('open'); }
    function validarMotivo() { document.getElementById('btn-confirmar').disabled = document.getElementById('motivo-txt').value.length < 10; }

    actualizar();
</script>
</body>
</html>
