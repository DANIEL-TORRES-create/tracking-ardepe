<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Panel de Control de Viajes</title> 
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos_addins3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="header-container">
    <h1 class="neon-title">PANEL - CONTROL DE VIAJES</h1>
    <div class="nav-shortcuts">
        <button class="btn-nav" onclick="location.href='#'" title="Configurar Viajes"><i class="fas fa-cog"></i> Configurar</button>
        <button class="btn-nav" onclick="location.href='#'" title="Programar Viajes"><i class="fas fa-calendar-plus"></i> Programar</button>
    </div>
</div>

<div class="dashboard">
    <table class="monitor-table">
        <thead>
            <tr>
                <th>UNIDAD / CONDUCTOR</th>
                <th>RUTA</th>
                <th>ORIGEN / DESTINO</th>
                <th>SALIDA REAL</th>
                <th>LLEGADA EST.</th>
                <th>PROGRESO</th>
                <th style="text-align:center;">CONTROL DEL VIAJE</th>
                <th style="text-align:center;">VISTAS</th>
            </tr>
        </thead>
        <tbody id="lista-viajes">
            <tr><td colspan="8" style="text-align:center; padding:40px;">Sincronizando flota...</td></tr>
        </tbody>
    </table>
</div>

<div id="side-panel">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
        <h2 id="side-placa" style="margin:0; font-weight:800;">Resumen</h2>
        <button onclick="cerrarPanel()" style="border:none; background:none; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <hr>
    <div id="timeline-v" class="timeline-v"></div>
</div>

<div id="modal-detalle-full">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 id="det-titulo" style="margin:0; font-weight:800;">Detalle de Viaje</h2>
        <button onclick="cerrarDetalle()" class="btn-volver">VOLVER AL PANEL</button>
    </div>
    <table class="monitor-table">
        <thead>
            <tr style="background: var(--primary); color: white;">
                <th>PUNTO</th>
                <th>HORA PLAN</th>
                <th>HORA REAL</th>
                <th>KM TRAMO PLAN</th>
                <th>KM TRAMO REAL</th>
                <th style="text-align:center;">DETECCIÓN</th>
            </tr>
        </thead>
        <tbody id="det-tabla-body"></tbody>
    </table>
</div>

<div id="modal-cancel" style="display:none;" class="modal-full-bg">
    <div class="modal-content">
        <h3 id="modal-accion-titulo">Confirmar Acción</h3>
        <p>Indique motivo (Mín. 10 caracteres):</p>
        <textarea id="motivo-txt" oninput="validarMotivo()"></textarea>
        <div style="text-align:right; margin-top:15px;">
            <button onclick="cerrarModal()" style="padding:8px 15px; cursor:pointer; border:none; border-radius:4px;">Salir</button>
            <button id="btn-confirmar" disabled onclick="ejecutarAccionManual()" style="padding:8px 15px; background:var(--danger); color:white; border:none; cursor:pointer; border-radius:4px;">Confirmar</button>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxsjiko1gXPneCtXlyv7ql3wdRQtWYZJJAjC2DwP1wyRRi4zhIFShVzsKlu54wNMNfl/exec"; 
    let _usuarioLogueado = "Monitor";
    let _viajeSeleccionado = null;
    let _tipoAccionManual = "";

    function actualizar() {
        const script = document.createElement('script');
        script.src = `${WEB_APP_URL}?read=viajes&full=true&callback=renderizar&v=${Date.now()}`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }

    window.renderizar = function(viajes) {
        const tbody = document.getElementById('lista-viajes');
        tbody.innerHTML = "";
        
        if (!viajes || viajes.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No hay viajes activos.</td></tr>';
            return;
        }

        viajes.forEach(v => {
            const estaEnCurso = (v.estado === "EN CURSO");
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b>${v.placa}</b><br><small style="color:#777">${v.conductor || 'S/C'}</small></td>
                <td><small>${v.ruta}</small></td>
                <td><i class="fas fa-map-marker-alt" style="color:var(--primary)"></i> ${v.origen}<br><i class="fas fa-flag-checkered"></i> ${v.destino}</td>
                <td style="font-weight:bold; color:black">${v.salidaReal}</td>
                <td style="font-weight:bold;">${v.llegadaEstimada}</td>
                <td>
                    <div class="segment-bar">${Array.from({length:10}, (_,i) => `<div class="segment ${i < (v.progreso/10) ? 'active' : ''}"></div>`).join('')}</div>
                    <small style="font-size:10px; font-weight:bold;">${v.progreso}%</small>
                </td>
                <td class="control-cell">
                    <button class="btn-ctrl ${estaEnCurso ? 'disabled' : ''}" title="Iniciar viaje manualmente" onclick="${estaEnCurso ? '' : `prepararAccion('${v.idViaje}', 'INICIAR')`}"><i class="fas fa-play-circle"></i></button>
                    <button class="btn-ctrl" title="Finalizar viaje" onclick="prepararAccion('${v.idViaje}', 'FINALIZAR')"><i class="fas fa-check-circle" style="color:var(--primary)"></i></button>
                    <button class="btn-ctrl" title="Cancelar viaje" onclick="prepararAccion('${v.idViaje}', 'CANCELAR')"><i class="fas fa-ban" style="color:var(--danger)"></i></button>
                </td>
                <td class="vistas-cell">
                    <button class="btn-vista" title="Ver línea de tiempo" onclick="abrirResumen('${encodeURIComponent(v.itinerarioFull)}', '${v.placa}')"><i class="fas fa-stream"></i></button>
                    <button class="btn-vista" title="Ver detalle de viaje" onclick="abrirDetalle('${v.placa}', '${encodeURIComponent(v.itinerarioFull)}')"><i class="fas fa-file-alt"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function abrirResumen(data, placa) {
        const puntos = JSON.parse(decodeURIComponent(data));
        document.getElementById('side-placa').innerText = placa;
        let html = "";
        puntos.forEach(p => {
            const clase = p.deteccion === "SI" ? "done" : (p.deteccion === "FORZADO" ? "forced" : "");
            html += `<div class="step ${clase}"><strong>${p.punto}</strong><br><small>${p.realHora !== "--:--" ? p.realHora : 'Pendiente'}</small></div>`;
        });
        document.getElementById('timeline-v').innerHTML = html;
        document.getElementById('side-panel').classList.add('open');
    }

    function abrirDetalle(placa, data) {
        const puntos = JSON.parse(decodeURIComponent(data));
        document.getElementById('det-titulo').innerText = "Detalle: " + placa;
        let html = "";
        puntos.forEach(p => {
            const icono = p.deteccion === "FORZADO" ? '<b style="color:red">X</b>' : (p.deteccion === "SI" ? '<b style="color:green">✓</b>' : '--');
            html += `<tr><td><b>${p.punto}</b></td><td>${p.planHora}</td><td>${p.realHora}</td><td>${p.planKm} km</td><td>${p.realKm} km</td><td style="text-align:center">${icono}</td></tr>`;
        });
        document.getElementById('det-tabla-body').innerHTML = html;
        document.getElementById('modal-detalle-full').style.display = 'block';
    }

    function prepararAccion(id, tipo) {
        _viajeSeleccionado = id;
        _tipoAccionManual = tipo;
        document.getElementById('modal-accion-titulo').innerText = tipo + " VIAJE";
        document.getElementById('modal-cancel').style.display = 'flex';
    }

    function ejecutarAccionManual() {
        const motivo = document.getElementById('motivo-txt').value;
        const url = `${WEB_APP_URL}?action=manual&id=${_viajeSeleccionado}&tipo=${_tipoAccionManual}&motivo=${encodeURIComponent(motivo)}&user=${encodeURIComponent(_usuarioLogueado)}`;
        fetch(url).then(() => { cerrarModal(); actualizar(); });
    }

    function cerrarPanel() { document.getElementById('side-panel').classList.remove('open'); }
    function cerrarDetalle() { document.getElementById('modal-detalle-full').style.display = 'none'; }
    function cerrarModal() { document.getElementById('modal-cancel').style.display = 'none'; document.getElementById('motivo-txt').value = ""; }
    function validarMotivo() { document.getElementById('btn-confirmar').disabled = document.getElementById('motivo-txt').value.length < 10; }

    geotab.addin.seguimiento = () => {
        return {
            initialize(api, state, callback) {
                api.getSession(s => { _usuarioLogueado = s.userName; });
                actualizar();
                setInterval(actualizar, 60000);
                callback();
            }
        };
    };
    actualizar();
</script>
</body>
</html>
