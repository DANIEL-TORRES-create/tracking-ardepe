<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Panel de Control de Viajes</title> <link rel="stylesheet" href="estilos_addins3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div style="background: #1a73e8; color: white; padding: 10px 20px; margin-bottom: 20px; border-radius: 4px;">
    <h2 style="margin:0;"><i class="fas fa-truck-loading"></i> Panel de Control de Viajes</h2>
</div>

<div class="dashboard">
    <div class="kpi-container">
        <div class="kpi-card"><h3>En Ruta</h3><span class="value" id="kpi-ruta">0</span></div>
        <div class="kpi-card alert"><h3>Retrasos (>15m)</h3><span class="value" id="kpi-retrasos">0</span></div>
        <div class="kpi-card"><h3>Por Iniciar</h3><span class="value" id="kpi-pendientes">0</span></div>
        <div class="kpi-card"><h3>Cumplimiento</h3><span class="value" id="kpi-cumplimiento">0%</span></div>
    </div>

    <table class="monitor-table">
        <thead>
            <tr>
                <th>PLACA</th>
                <th>RUTA</th>
                <th>PROGRESO</th>
                <th>DESVIACIÓN</th>
                <th>KM EXTRA TOTAL</th>
                <th>KM GPS ACTUAL</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody id="lista-viajes">
            <tr><td colspan="7" style="text-align:center; padding:40px;">Cargando datos de flota...</td></tr>
        </tbody>
    </table>
</div>

<div id="side-panel">
    <div style="display:flex; justify-content: space-between;">
        <h2 id="side-placa">Detalle</h2>
        <button onclick="cerrarPanel()" style="border:none; background:none; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <hr>
    <div id="timeline-content"></div>
</div>

<div id="modal-cancel" style="display:none;">
    <div class="modal-content">
        <h3>Cancelar Viaje</h3>
        <p>Indique motivo (Mín. 10 caracteres):</p>
        <textarea id="motivo-txt" oninput="validarMotivo()"></textarea>
        <div style="text-align:right; margin-top:10px;">
            <button onclick="cerrarModal()" style="padding:8px 15px;">Salir</button>
            <button id="btn-confirmar" disabled onclick="confirmarCancelacion()" style="padding:8px 15px; background: #d93025; color:white; border:none; border-radius:4px;">Confirmar</button>
        </div>
    </div>
</div>

<script>
    // IMPORTANTE: Reemplaza con tu URL de implementación actual
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxsjiko1gXPneCtXlyv7ql3wdRQtWYZJJAjC2DwP1wyRRi4zhIFShVzsKlu54wNMNfl/exec"; 
    let idParaCancelar = null;

    function actualizar() {
        const script = document.createElement('script');
        // Agregamos timestamp para evitar caché del navegador
        script.src = `${WEB_APP_URL}?read=viajes&full=true&callback=renderizar&v=${new Date().getTime()}`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
        script.onerror = () => {
            document.getElementById('lista-viajes').innerHTML = '<tr><td colspan="7" style="color:red; text-align:center;">Error de conexión con el servidor. Revisa la URL.</td></tr>';
        };
    }

    window.renderizar = function(viajes) {
        const tbody = document.getElementById('lista-viajes');
        if (!viajes || viajes.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:20px;">No hay viajes activos hoy.</td></tr>';
            return;
        }

        tbody.innerHTML = "";
        let enRuta = 0, retrasos = 0, pendientes = 0;

        viajes.forEach(v => {
            if (v.estado === "EN CURSO") enRuta++;
            if (v.estado === "PROGRAMADO") pendientes++;
            if (v.minutosDesv > 15) retrasos++;

            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b>${v.placa}</b></td>
                <td>${v.ruta}</td>
                <td>
                    <div style="width:100%; background:#eee; border-radius:10px; height:8px;">
                        <div style="width:${v.progreso}%; background:#1e8e3e; height:8px; border-radius:10px;"></div>
                    </div>
                    <small>${v.progreso}% completado</small>
                </td>
                <td><span class="badge ${v.minutosDesv > 15 ? 'badge-red' : 'badge-green'}">${v.desviacion}</span></td>
                <td class="${v.kmExtra > 5 ? 'km-alerta' : ''}">+ ${v.kmExtra} KM</td>
                <td>${v.odoActual}</td>
                <td>
                    <button onclick="abrirTimeline('${encodeURIComponent(v.itinerarioFull)}', '${v.placa}')" title="Detalle"><i class="fas fa-list"></i></button>
                    <button onclick="abrirModal('${v.idViaje}')" title="Cancelar" style="color:#d93025;"><i class="fas fa-ban"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('kpi-ruta').innerText = enRuta;
        document.getElementById('kpi-retrasos').innerText = retrasos;
        document.getElementById('kpi-pendientes').innerText = pendientes;
        document.getElementById('kpi-cumplimiento').innerText = (((viajes.length - retrasos) / viajes.length) * 100).toFixed(0) + "%";
    }

    function abrirTimeline(dataRaw, placa) {
        const iti = JSON.parse(decodeURIComponent(dataRaw));
        document.getElementById('side-placa').innerText = "Timeline: " + placa;
        let html = "";
        iti.forEach(p => {
            html += `
                <div class="timeline-item ${p.visitado ? 'done' : ''}">
                    <strong>${p.punto}</strong><br>
                    <small>Plan: ${p.planKm} km | Real: ${p.realKm} km</small><br>
                    <small style="font-weight:bold; color:${p.exceso > 0 ? '#d93025' : '#1e8e3e'}">
                        Exceso: +${p.exceso} km
                    </small>
                </div>`;
        });
        document.getElementById('timeline-content').innerHTML = html;
        document.getElementById('side-panel').classList.add('open');
    }

    function abrirModal(id) { idParaCancelar = id; document.getElementById('modal-cancel').style.display = 'flex'; }
    function cerrarModal() { document.getElementById('modal-cancel').style.display = 'none'; }
    function cerrarPanel() { document.getElementById('side-panel').classList.remove('open'); }
    function validarMotivo() {
        const val = document.getElementById('motivo-txt').value;
        document.getElementById('btn-confirmar').disabled = val.length < 10;
    }

    // Inicialización para Geotab
    geotab.addin.seguimiento = () => {
        return {
            initialize(api, state, callback) {
                actualizar();
                setInterval(actualizar, 60000); // Actualiza cada 1 minuto
                callback();
            }
        };
    };
</script>
</body>
</html>
