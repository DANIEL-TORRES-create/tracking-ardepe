<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos_addins3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="header-container">
    <h1 class="neon-title">PANEL - CONTROL DE VIAJES</h1>
    <div class="nav-shortcuts">
        <button class="btn-nav" id="btn-config"><i class="fas fa-cog"></i> Configurar</button>
        <button class="btn-nav" id="btn-prog"><i class="fas fa-calendar-plus"></i> Programar</button>
        <button class="btn-nav" id="btn-hist"><i class="fas fa-history"></i> Histórico</button>
    </div>
</div>

<div class="dashboard">
    <table class="monitor-table">
        <thead>
            <tr>
                <th>UNIDAD / CONDUCTOR</th>
                <th>RUTA</th>
                <th>ORIGEN / DESTINO</th>
                <th>SALIDA REAL</th>
                <th>LLEGADA EST.</th>
                <th>PROGRESO</th>
                <th style="text-align:center;">CONTROL DEL VIAJE</th>
                <th style="text-align:center;">VISTAS</th>
            </tr>
        </thead>
        <tbody id="lista-viajes">
            <tr><td colspan="8" style="text-align:center; padding:40px;">Sincronizando datos...</td></tr>
        </tbody>
    </table>
</div>

<div id="side-panel">
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <h2 id="side-placa" style="margin:0; font-weight:800; color:var(--primary);">Resumen</h2>
        <button onclick="cerrarPanel()" style="border:none; background:none; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
    <div id="timeline-v" class="timeline-v"></div>
</div>

<div id="modal-cancel" class="modal-full-bg" style="display:none;">
    <div class="modal-content">
        <h3 id="modal-accion-titulo">Confirmar Acción</h3>
        <p>Indique motivo (Mín. 10 caracteres):</p>
        <textarea id="motivo-txt" oninput="validarMotivo()"></textarea>
        <div style="text-align:right; margin-top:15px;">
            <button onclick="cerrarModal()" class="btn-secundario">Salir</button>
            <button id="btn-confirmar" disabled onclick="ejecutarAccionManual()" class="btn-primario">Confirmar</button>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxsjiko1gXPneCtXlyv7ql3wdRQtWYZJJAjC2DwP1wyRRi4zhIFShVzsKlu54wNMNfl/exec"; 
    let _usuarioLogueado = "Monitor";
    let _viajeSeleccionado = null;
    let _tipoAccionManual = "";

    function actualizar() {
        const script = document.createElement('script');
        script.src = `${WEB_APP_URL}?read=viajes&callback=renderizar&v=${Date.now()}`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }

    window.renderizar = function(viajes) {
        const tbody = document.getElementById('lista-viajes');
        if (!tbody) return;
        tbody.innerHTML = "";
        viajes.forEach(v => {
            const estaEnCurso = (v.estado === "EN CURSO");
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b>${v.placa}</b><br><small style="color:#777">${v.conductor}</small></td>
                <td><small>${v.ruta}</small></td>
                <td><i class="fas fa-map-marker-alt" style="color:var(--primary)"></i> ${v.origen}<br><i class="fas fa-flag-checkered"></i> ${v.destino}</td>
                <td style="color:black; font-weight:bold;">${v.salidaReal}</td>
                <td style="font-weight:bold;">${v.llegadaEstimada}</td>
                <td>
                    <div class="segment-bar">${Array.from({length:10}, (_,i) => `<div class="segment ${i < (v.progreso/10) ? 'active' : ''}"></div>`).join('')}</div>
                    <small style="font-size:10px; font-weight:bold;">${v.progreso}%</small>
                </td>
                <td class="control-cell">
                    <button class="btn-ctrl ${estaEnCurso ? 'disabled' : ''}" onclick="${estaEnCurso ? '' : `prepararAccion('${v.idViaje}', 'INICIAR')`}"><i class="fas fa-play-circle"></i></button>
                    <button class="btn-ctrl" onclick="prepararAccion('${v.idViaje}', 'FINALIZAR')"><i class="fas fa-check-circle" style="color:var(--primary)"></i></button>
                    <button class="btn-ctrl" onclick="prepararAccion('${v.idViaje}', 'CANCELAR')"><i class="fas fa-ban" style="color:var(--danger)"></i></button>
                </td>
                <td class="vistas-cell">
                    <button class="btn-vista" onclick="abrirResumen('${encodeURIComponent(v.itinerarioFull)}', '${v.placa}')"><i class="fas fa-stream"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function ejecutarAccionManual() {
        const btn = document.getElementById('btn-confirmar');
        btn.disabled = true;
        btn.innerHTML = 'Procesando...';
        const motivo = document.getElementById('motivo-txt').value;
        fetch(`${WEB_APP_URL}?action=manual&id=${_viajeSeleccionado}&tipo=${_tipoAccionManual}&motivo=${encodeURIComponent(motivo)}&user=${_usuarioLogueado}`)
        .then(() => { cerrarModal(); actualizar(); });
    }

    function abrirResumen(data, placa) {
        const puntos = JSON.parse(decodeURIComponent(data));
        document.getElementById('side-placa').innerText = placa;
        document.getElementById('timeline-v').innerHTML = puntos.map(p => `
            <div class="step ${p.deteccion === 'SI' ? 'done' : (p.deteccion === 'FORZADO' ? 'forced' : '')}">
                <strong>${p.punto}</strong><br><small>${p.realHora}</small>
            </div>`).join('');
        document.getElementById('side-panel').classList.add('open');
    }

    function cerrarModal() { document.getElementById('modal-cancel').style.display = 'none'; document.getElementById('motivo-txt').value = ""; }
    function cerrarPanel() { document.getElementById('side-panel').classList.remove('open'); }
    function validarMotivo() { document.getElementById('btn-confirmar').disabled = document.getElementById('motivo-txt').value.length < 10; }

    geotab.addin.seguimiento = () => {
        return {
            initialize(api, state, callback) {
                api.getSession(s => { _usuarioLogueado = s.userName; });
                
                // NAVEGACIÓN CORREGIDA SEGÚN JSON
                document.getElementById('btn-config').onclick = () => api.setState("TRK_ARDEPE_CONTAINER/ActivityLink/TRK_ARDEPE_CONFIG");
                document.getElementById('btn-prog').onclick = () => api.setState("TRK_ARDEPE_CONTAINER/ActivityLink/TRK_ARDEPE_PROG");
                document.getElementById('btn-hist').onclick = () => api.setState("TRK_ARDEPE_CONTAINER/ActivityLink/TRK_ARDEPE_HIST");
                
                actualizar();
                setInterval(actualizar, 60000);
                callback();
            }
        };
    };
    actualizar();
</script>
</body>
</html>
