<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos_addins3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="header-top">
    <h2><i class="fas fa-satellite-dish"></i> PANEL DE CONTROL DE VIAJES</h2>
    <div id="clock" style="font-weight: 800; color: var(--neon-accent);"></div>
</div>

<div class="dashboard">
    <div class="kpi-container">
        <div class="kpi-card"><h3>En Ruta</h3><span class="value" id="kpi-ruta">0</span></div>
        <div class="kpi-card" style="border-left-color: var(--danger);"><h3>Retrasos</h3><span class="value" id="kpi-retrasos">0</span></div>
        <div class="kpi-card" style="border-left-color: var(--warning);"><h3>Programados</h3><span class="value" id="kpi-pendientes">0</span></div>
        <div class="kpi-card" style="border-left-color: var(--success);"><h3>Eficiencia</h3><span class="value" id="kpi-cumplimiento">0%</span></div>
    </div>

    <table class="monitor-table">
        <thead>
            <tr>
                <th>UNIDAD / CONDUCTOR</th>
                <th>RUTA</th>
                <th>ORIGEN / DESTINO</th>
                <th>PROGRESO</th>
                <th>LLEGADA EST.</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody id="lista-viajes"></tbody>
    </table>
</div>

<div id="side-panel">
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <h3 id="side-placa" style="margin:0;">Resumen</h3>
        <button onclick="cerrarPanel()" class="btn-action"><i class="fas fa-times"></i></button>
    </div>
    <hr>
    <div id="timeline-v" class="timeline-v"></div>
</div>

<div id="modal-detalle-full">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 20px;">
        <h2 id="det-titulo" style="font-weight: 800;"></h2>
        <button onclick="cerrarDetalle()" class="btn-action" style="background:var(--secondary); color:white; padding:10px 20px; border-radius:30px;">CERRAR</button>
    </div>
    
    <table class="monitor-table" style="font-size: 13px;">
        <thead>
            <tr style="background: var(--secondary); color: white;">
                <th>Punto</th>
                <th>Hora Plan</th>
                <th>Llegada Real</th>
                <th>Salida Real</th>
                <th style="color:var(--neon-accent);">Pernocte Real</th>
                <th>KM Tramo Plan</th>
                <th>KM Tramo Real</th>
                <th>Detección</th>
            </tr>
        </thead>
        <tbody id="det-tabla-body"></tbody>
    </table>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxsjiko1gXPneCtXlyv7ql3wdRQtWYZJJAjC2DwP1wyRRi4zhIFShVzsKlu54wNMNfl/exec";
    let _usuarioLogueado = "Monitor";

    function calcularPernocteReal(entrada, salida) {
        if (!entrada || !salida || entrada === "--:--" || salida === "--:--") return "00:00";
        try {
            let e = new Date(entrada.split(' ').reverse().join(' '));
            let s = new Date(salida.split(' ').reverse().join(' '));
            let diff = Math.floor((s - e) / 60000);
            if (diff < 0) return "00:00";
            let h = Math.floor(diff / 60);
            let m = diff % 60;
            return (h < 10 ? "0"+h : h) + ":" + (m < 10 ? "0"+m : m);
        } catch(err) { return "00:00"; }
    }

    function actualizar() {
        const script = document.createElement('script');
        script.src = `${WEB_APP_URL}?read=viajes&full=true&callback=renderizar&v=${Date.now()}`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }

    window.renderizar = function(viajes) {
        const tbody = document.getElementById('lista-viajes');
        tbody.innerHTML = "";
        let ruta = 0, pendientes = 0;

        viajes.forEach(v => {
            if (v.estado === "EN CURSO") ruta++; else pendientes++;
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td><div style="font-weight:800;">${v.placa}</div><div style="font-size:10px; color:#8e8e93;">${v.conductor}</div></td>
                <td><small>${v.ruta}</small></td>
                <td><div style="font-size:11px;"><i class="fas fa-map-marker-alt" style="color:var(--primary)"></i> ${v.origen}<br><i class="fas fa-flag-checkered"></i> ${v.destino}</div></td>
                <td>
                    <div class="segment-bar">${Array.from({length:10}, (_,i) => `<div class="segment ${i < (v.progreso/10) ? 'active' : ''}"></div>`).join('')}</div>
                    <small style="font-size:9px; font-weight:bold;">${v.progreso}%</small>
                </td>
                <td style="font-weight:800; color:var(--primary);">${v.llegadaEstimada}</td>
                <td>
                    <button class="btn-action" onclick="abrirResumen('${encodeURIComponent(v.itinerarioFull)}', '${v.placa}')"><i class="fas fa-stream"></i></button>
                    <button class="btn-action" onclick="abrirDetalle('${v.placa}', '${encodeURIComponent(v.itinerarioFull)}')"><i class="fas fa-file-invoice"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
        document.getElementById('kpi-ruta').innerText = ruta;
        document.getElementById('kpi-pendientes').innerText = pendientes;
    }

    function abrirResumen(data, placa) {
        const puntos = JSON.parse(decodeURIComponent(data));
        document.getElementById('side-placa').innerText = placa;
        let html = "";
        puntos.forEach(p => {
            const clase = p.deteccion === "SI" ? "done" : (p.deteccion === "FORZADO" ? "forced" : "");
            html += `<div class="step ${clase}"><strong>${p.punto}</strong><br><small>${p.realHora}</small></div>`;
        });
        document.getElementById('timeline-v').innerHTML = html;
        document.getElementById('side-panel').classList.add('open');
    }

    function abrirDetalle(placa, data) {
        const puntos = JSON.parse(decodeURIComponent(data));
        document.getElementById('det-titulo').innerText = "AUDITORÍA: " + placa;
        let html = "";
        puntos.forEach(p => {
            let pReal = calcularPernocteReal(p.realHora, p.realSalida);
            html += `<tr>
                <td><b>${p.punto}</b></td>
                <td>${p.planHora}</td>
                <td>${p.realHora}</td>
                <td>${p.realSalida}</td>
                <td style="font-weight:800; color:var(--primary);">${pReal}</td>
                <td>${p.planKm} km</td>
                <td>${p.realKm} km</td>
                <td>${p.deteccion === 'FORZADO' ? '<b style="color:red">X MANUAL</b>' : '✓ GPS'}</td>
            </tr>`;
        });
        document.getElementById('det-tabla-body').innerHTML = html;
        document.getElementById('modal-detalle-full').style.display = 'block';
    }

    function cerrarPanel() { document.getElementById('side-panel').classList.remove('open'); }
    function cerrarDetalle() { document.getElementById('modal-detalle-full').style.display = 'none'; }
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    geotab.addin.seguimiento = () => {
        return {
            initialize(api, state, callback) {
                api.getSession(s => { document.getElementById('user-info').innerText = "Monitor: " + s.userName; });
                actualizar();
                setInterval(actualizar, 60000);
                callback();
            }
        };
    };
</script>
</body>
</html>
