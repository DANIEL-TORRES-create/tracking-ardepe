<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Panel de Control de Viajes</title> 
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos_addins3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="main-header">
    <h1 class="neon-title">PANEL - CONTROL DE VIAJES</h1>
    <div id="user-info" style="font-size: 12px; color: #fff; opacity: 0.7;"></div>
</div>

<div class="dashboard">
    <table class="monitor-table">
        <thead>
            <tr>
                <th>UNIDAD / CONDUCTOR</th>
                <th>RUTA</th>
                <th>ORIGEN / DESTINO</th>
                <th>SALIDA REAL</th>
                <th>LLEGADA EST.</th>
                <th>PROGRESO</th>
                <th>CONTROL DEL VIAJE</th>
                <th>VISTAS</th>
            </tr>
        </thead>
        <tbody id="lista-viajes">
            <tr><td colspan="8" style="text-align:center; padding:40px;">Cargando flota...</td></tr>
        </tbody>
    </table>
</div>

<div id="side-panel">
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <h3 id="side-placa" style="margin:0;">Resumen</h3>
        <button onclick="cerrarPanel()" class="btn-action"><i class="fas fa-times"></i></button>
    </div>
    <hr>
    <div id="timeline-v" class="timeline-v"></div>
</div>

<div id="modal-detalle-full">
    <button class="btn-volver" onclick="cerrarDetalle()"><i class="fas fa-arrow-left"></i> VOLVER</button>
    <button class="btn-volver" style="left:120px; background:var(--primary);" onclick="verEnMapa()"><i class="fas fa-map-marked-alt"></i> VER EN MAPA</button>
    
    <h2 id="det-titulo" style="margin-top:20px;">Auditoría de Viaje</h2>
    <table class="monitor-table">
        <thead style="background:#3c4043; color:white;">
            <tr>
                <th>PUNTO</th>
                <th>HORA PLAN</th>
                <th>HORA REAL</th>
                <th>KM TRAMO PLAN</th>
                <th>KM TRAMO REAL</th>
                <th>DETECCIÓN</th>
            </tr>
        </thead>
        <tbody id="det-tabla-body"></tbody>
    </table>
</div>

<div id="modal-cancel" style="display:none;" class="modal-full-bg">
    <div class="modal-content">
        <h3 id="modal-accion-titulo">Confirmar Acción</h3>
        <p id="modal-instruccion">Indique motivo (Mín. 10 caracteres):</p>
        <textarea id="motivo-txt" oninput="validarMotivo()" placeholder="Escriba aquí la razón..."></textarea>
        <div style="text-align:right; margin-top:10px;">
            <button onclick="cerrarModal()" class="btn-volver" style="position:static; background:#777;">Salir</button>
            <button id="btn-confirmar" disabled onclick="ejecutarAccionManual()" style="padding:8px 15px; background: var(--danger); color:white; border:none; border-radius:4px; cursor:pointer;">Confirmar</button>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxsjiko1gXPneCtXlyv7ql3wdRQtWYZJJAjC2DwP1wyRRi4zhIFShVzsKlu54wNMNfl/exec"; 
    let _usuarioLogueado = "Monitor";
    let _viajeSeleccionado = null;
    let _tipoAccionManual = "";

    function actualizar() {
        const script = document.createElement('script');
        script.src = `${WEB_APP_URL}?read=viajes&full=true&callback=renderizar&v=${Date.now()}`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }

    window.renderizar = function(viajes) {
        const tbody = document.getElementById('lista-viajes');
        tbody.innerHTML = "";
        
        viajes.forEach(v => {
            const estaEnCurso = v.estado === "EN CURSO";
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b>${v.placa}</b><br><small style="color:#777">${v.conductor}</small></td>
                <td>${v.ruta}</td>
                <td><i class="fas fa-map-marker-alt"></i> ${v.origen}<br><i class="fas fa-flag-checkered"></i> ${v.destino}</td>
                <td style="font-weight:bold; color:var(--primary)">${v.salidaReal}</td>
                <td style="font-weight:bold;">${v.llegadaEstimada}</td>
                <td>
                    <div class="segment-bar">${Array.from({length:10}, (_,i) => `<div class="segment ${i < (v.progreso/10) ? 'active' : ''}"></div>`).join('')}</div>
                    <small>${v.progreso}% completado</small>
                </td>
                <td class="control-cell">
                    <button class="btn-ctrl ${estaEnCurso ? 'disabled' : ''}" onclick="${estaEnCurso ? '' : `prepararAccion('${v.idViaje}', 'INICIAR')`}" title="Iniciar viaje manualmente"><i class="fas fa-play"></i></button>
                    <button class="btn-ctrl" onclick="prepararAccion('${v.idViaje}', 'FINALIZAR')" title="Cerrar viaje y enviar a histórico"><i class="fas fa-check-circle" style="color:var(--primary)"></i></button>
                    <button class="btn-ctrl" onclick="prepararAccion('${v.idViaje}', 'CANCELAR')" title="Anular viaje por incidencia"><i class="fas fa-ban" style="color:var(--danger)"></i></button>
                </td>
                <td class="vistas-cell">
                    <button class="btn-vista" onclick="abrirResumen('${encodeURIComponent(v.itinerarioFull)}', '${v.placa}')" title="Ver línea de tiempo"><i class="fas fa-stream"></i></button>
                    <button class="btn-vista" onclick="abrirDetalle('${v.placa}', '${encodeURIComponent(v.itinerarioFull)}')" title="Ver detalle de viaje"><i class="fas fa-file-alt"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // --- FUNCIONES DE VISTA ---
    function abrirResumen(data, placa) {
        const puntos = JSON.parse(decodeURIComponent(data));
        document.getElementById('side-placa').innerText = placa;
        let html = "";
        puntos.forEach(p => {
            const clase = p.deteccion === "SI" ? "done" : (p.deteccion === "FORZADO" ? "forced" : "");
            html += `<div class="step ${clase}">
                <strong>${p.punto}</strong><br>
                <small>${p.realHora !== "--:--" ? '<i class="fas fa-clock"></i> '+p.realHora : 'Pendiente'}</small>
            </div>`;
        });
        document.getElementById('timeline-v').innerHTML = html;
        document.getElementById('side-panel').classList.add('open');
    }

    function abrirDetalle(placa, data) {
        const puntos = JSON.parse(decodeURIComponent(data));
        document.getElementById('det-titulo').innerText = "Detalle de Ruta: " + placa;
        let html = "";
        puntos.forEach(p => {
            const detLog = p.deteccion === "FORZADO" ? `<span style="color:red"><b>X</b></span>` : (p.deteccion === "SI" ? `<span style="color:green">✓</span>` : "--");
            html += `<tr>
                <td><b>${p.punto}</b></td>
                <td>${p.planHora}</td>
                <td>${p.realHora}</td>
                <td>${p.planKm} km</td>
                <td>${p.realKm} km</td>
                <td style="text-align:center">${detLog}</td>
            </tr>`;
        });
        document.getElementById('det-tabla-body').innerHTML = html;
        document.getElementById('modal-detalle-full').style.display = 'block';
    }

    // --- FUNCIONES OPERATIVAS ---
    function prepararAccion(id, tipo) {
        _viajeSeleccionado = id;
        _tipoAccionManual = tipo;
        document.getElementById('modal-accion-titulo').innerText = tipo + " VIAJE";
        document.getElementById('modal-cancel').style.display = 'flex';
    }

    function ejecutarAccionManual() {
        const motivo = document.getElementById('motivo-txt').value;
        const url = `${WEB_APP_URL}?action=manual&id=${_viajeSeleccionado}&tipo=${_tipoAccionManual}&motivo=${encodeURIComponent(motivo)}&user=${encodeURIComponent(_usuarioLogueado)}`;
        fetch(url).then(() => {
            cerrarModal();
            actualizar();
        });
    }

    // --- UTILIDADES ---
    function cerrarPanel() { document.getElementById('side-panel').classList.remove('open'); }
    function cerrarDetalle() { document.getElementById('modal-detalle-full').style.display = 'none'; }
    function cerrarModal() { document.getElementById('modal-cancel').style.display = 'none'; document.getElementById('motivo-txt').value = ""; }
    function validarMotivo() { document.getElementById('btn-confirmar').disabled = document.getElementById('motivo-txt').value.length < 10; }
    function verEnMapa() { alert("Sincronizando con mapa..."); }

    geotab.addin.seguimiento = () => {
        return {
            initialize(api, state, callback) {
                api.getSession(s => { 
                    _usuarioLogueado = s.userName;
                    document.getElementById('user-info').innerText = "Monitor: " + s.userName; 
                });
                actualizar();
                setInterval(actualizar, 60000);
                callback();
            }
        };
    };
</script>
</body>
</html>
