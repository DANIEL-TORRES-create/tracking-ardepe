<script>
  // Inicialización y Polling cada 5 minutos
  window.onload = function() {
    actualizarDatos();
    setInterval(actualizarDatos, 300000); 
  };

  function actualizarDatos() {
    console.log("Sincronizando con DB_OPERACION...");
    google.script.run
      .withSuccessHandler(dibujarInterfaz)
      .withFailureHandler(err => console.error("Error:", err))
      .logic_seguimiento.obtenerViajesActivosFull();
  }

  function dibujarInterfaz(viajes) {
    const contenedor = document.getElementById('lista-viajes');
    contenedor.innerHTML = "";
    
    let enRuta = 0;
    let retrasados = 0;

    viajes.forEach(v => {
      if (v.estado === "EN CURSO") enRuta++;
      if (v.minutosDesv > 15) retrasados++;

      let fila = document.createElement('tr');
      
      // Lógica de Odómetro / KM Extra (Tolerancia Cero)
      let displayKm = `<span style="color:#95a5a6">Odómetro no Disponible</span>`;
      
      if (v.odoActual !== "---" && v.odoAnterior !== "---") {
        let act = parseFloat(v.odoActual);
        let ant = parseFloat(v.odoAnterior);
        let tramoReal = act - ant;

        // Si la resta es coherente
        if (tramoReal >= 0) {
          // El backend debe proveer kmPlanTramo si lo calculamos allí
          let dif = tramoReal - (v.kmPlanTramo || 0); 
          if (dif > 3) {
            displayKm = `<b style="color:#e74c3c">+${dif.toFixed(1)} km</b>`;
          } else {
            displayKm = `<span style="color:#2ecc71">${dif.toFixed(1)} km</span>`;
          }
        }
      }

      fila.innerHTML = `
        <td><b>${v.placa}</b><br><small>${v.idViaje}</small></td>
        <td>${v.conductor}<br><small><b>${v.ruta}</b></small></td>
        <td>
          <div style="background:#eee; height:10px; border-radius:5px; width:100px; margin-bottom:4px;">
            <div style="background:#2ecc71; height:100%; border-radius:5px; width:${v.progreso}%"></div>
          </div>
          <small>${v.progreso}% completado</small>
        </td>
        <td class="${v.minutosDesv > 15 ? 'retraso-critico' : ''}">${v.desviacion}</td>
        <td>${displayKm}</td>
        <td>
          <button class="btn-action" style="background:#3498db; color:white;" onclick="abrirPanel('${v.idViaje}', '${v.itinerario}')">📋</button>
          <button class="btn-action btn-finalizar" onclick="cierreManual('${v.idViaje}', 'FINALIZADO')">🏁</button>
          <button class="btn-action btn-cancelar" onclick="cierreManual('${v.idViaje}', 'CANCELADO')">🚫</button>
        </td>
      `;
      contenedor.appendChild(fila);
    });

    // Actualizar KPIs
    document.getElementById('count-ruta').innerText = enRuta;
    document.getElementById('count-retraso').innerText = retrasados;
    document.getElementById('perc-cumplimiento').innerText = (viajes.length > 0 ? (((viajes.length - retrasados) / viajes.length) * 100).toFixed(0) : 100) + "%";
  }

  function abrirPanel(id, itiRaw) {
    document.getElementById('side-panel').classList.add('open');
    document.getElementById('panel-titulo').innerText = "Timeline: " + id;
    
    const iti = JSON.parse(itiRaw);
    const timeline = document.getElementById('timeline-content');
    timeline.innerHTML = "";

    iti.forEach(p => {
      let item = document.createElement('div');
      item.style.padding = "10px";
      item.style.borderLeft = "2px solid #3498db";
      item.style.marginLeft = "10px";
      item.style.position = "relative";
      item.innerHTML = `<span style="position:absolute; left:-6px; top:12px; background:white; border:2px solid #3498db; border-radius:50%; width:10px; height:10px;"></span>
                        <b>${p.punto}</b><br><small>Plan: ${p.eta || '---'}</small>`;
      timeline.appendChild(item);
    });

    // Cargar Mini Mapa Estático (Usa el primer punto como referencia)
    if (iti.length > 0 && iti[0].lat) {
      const url = `https://maps.googleapis.com/maps/api/staticmap?center=${iti[0].lat},${iti[0].lon}&zoom=14&size=340x250&markers=color:red%7C${iti[0].lat},${iti[0].lon}&key=TU_API_KEY_AQUI`;
      document.getElementById('mini-mapa').src = url;
      document.getElementById('mini-mapa').style.display = "block";
    }
  }

  function cerrarPanel() {
    document.getElementById('side-panel').classList.remove('open');
  }

  function cierreManual(id, estado) {
    let msg = "¿Confirmar cambio de estado a " + estado + " para el viaje " + id + "?";
    if (estado === 'CANCELADO') {
      let motivo = prompt("Ingrese motivo de cancelación (mínimo 10 caracteres):");
      if (!motivo || motivo.length < 10) {
        alert("Cancelación rechazada: Motivo insuficiente.");
        return;
      }
      google.script.run.withSuccessHandler(actualizarDatos).logic_seguimiento.gestionarEstadoViaje(id, estado, "MANUAL_" + motivo);
    } else {
      if (confirm(msg)) {
        google.script.run.withSuccessHandler(actualizarDatos).logic_seguimiento.gestionarEstadoViaje(id, estado, "CIERRE_MANUAL_MONITOR");
      }
    }
  }
</script>
