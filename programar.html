<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="estilos.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .seccion-lista { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .btn-lupa { padding: 5px 15px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; }
        .modo-masivo { background: #f0f7ff; padding: 15px; border: 1px solid #1a73e8; border-radius: 8px; margin-bottom: 20px; }
        .editando { border: 2px solid #f2994a !important; background: #fff4e5; }
        .input-file-custom { padding: 8px; background: white; border: 1px solid #ccc; border-radius: 4px; flex-grow: 1; }
        .btn-descarga { background: #27ae60; color: white; padding: 8px 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; }
        .error-log { background: #fee; color: #b00; padding: 10px; border-radius: 4px; margin-top: 10px; display: none; font-size: 12px; border: 1px solid #b00; line-height: 1.5; }
        .tabla-constructor th { font-size: 11px; }
        input:disabled, select:disabled { background-color: #eee !important; cursor: not-allowed; color: #666; }
    </style>
</head>
<body>

<div class="card-container">
    <h2 class="titulo-seccion">📅 Control de Programación y Edición</h2>
    
    <!-- 🏛️ CONTENEDOR DE DOS COLUMNAS EN ACCIÓN CORREGIDO -->
    <div class="bunker-split-container">
        
        <!-- [VENTANA IZQUIERDA (50%)]: OPERACIONES DE DESPACHO -->
        <div class="columna-izquierda-pro">
            
            <!-- Carga Masiva Excel -->
            <div class="modo-masivo">
              <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                  <label style="font-size: 12px !important;">📊 PANEL DE CARGA MASIVA EXCEL</label>
                  <button onclick="exportarPlantilla()" class="btn-descarga" style="padding: 5px 12px !important; font-size: 10px !important;">📥 Plantilla</button>
              </div>
                <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px; width: 100%;">
                    <!-- Zona de arrastre estilizada - div para soportar drag&drop nativo -->
                    <div id="zonaArrastre" style="
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        width: 100%;
                        min-height: 70px;
                        border: 2px dashed rgba(255,255,255,0.4);
                        border-radius: 8px;
                        background: rgba(255,255,255,0.08);
                        cursor: pointer;
                        transition: border-color 0.2s ease, background 0.2s ease;
                        box-sizing: border-box;
                        padding: 10px;
                    ">
                        <span style="font-size:22px; margin-bottom:4px;">📂</span>
                        <span id="zonaArrastreTexto" style="color:#ffffff; font-size:11px; font-weight:700; letter-spacing:0.5px; text-align:center;">Arrastre su archivo aquí</span>
                        <span style="color:rgba(255,255,255,0.6); font-size:10px; margin-top:2px;">o haga clic para seleccionar</span>
                    </div>
                    <!-- Input oculto - la lógica JS sigue leyendo fileInput.files[0] -->
                    <input type="file" id="inputExcel" style="display:none;" accept=".xlsx,.xls">
                    <button id="btnProcesarExcel" class="btn-lupa" style="height: 33px; width: 100%;">Validar y Subir</button>
                </div>
                <div id="errorLog" class="error-log"></div>
            </div>

            <!-- Registro Manual Especializado -->
            <div id="prg-contenedorManual" class="barra-herramientas" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="hidden" id="idEdicion"> 
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label>1. RUTA MAESTRA:</label>
                    <div style="display: flex; align-items: center; gap: 8px; width: 100%;">
                        <select id="selectRuta" style="width: 100%;"><option value="">Cargando...</option></select>
                        <label style="white-space: nowrap; display: flex; align-items: center; gap: 4px; margin: 0;"><input type="checkbox" id="checkRetorno" style="margin:0;"> ¿RET?</label>
                    </div>
                    <label>2. SALIDA PROGRAMADA (ETD):</label>
                    <input type="datetime-local" id="fechaSalida" style="width: 100%;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label id="lblVehiculo">3. VEHÍCULO (PLACA):</label>
                    <input list="listaVehiculos" id="inputVehiculo" name="prg-vehiculo-input" placeholder="Placa..." autocomplete="new-password" style="width: 100%;">
                    <datalist id="listaVehiculos"></datalist>
                    <label>4. CONDUCTOR ASIGNADO:</label>
                    <input list="listaConductores" id="inputConductor" placeholder="Conductor..." style="width: 100%;">
                    <datalist id="listaConductores"></datalist>
                </div>
            </div>

            <!-- Previsuálización del Itinerario Calculado -->
            <table class="tabla-constructor">
                <thead>
                    <tr>
                        <th style="width: 40px;">Ord</th>
                        <th style="text-align: left; padding-left: 8px;">Punto de Control</th>
                        <th>Km</th>
                        <th>ETA Llegada</th>
                        <th>ETD Salida</th>
                    </tr>
                </thead>
                <tbody id="cuerpoItinerario"></tbody>
            </table>

            <!-- Acciones de Confirmación -->
            <div style="margin-top: 10px; display: flex; gap: 10px; justify-content: flex-end;">
                <button id="prg-btnCancelar" class="btn-cancelar" style="margin: 0;">❌ Cancelar</button>
                <button id="btnProgramar" class="btn-guardar" style="margin: 0;">🚚 Confirmar Viaje</button>
            </div>

        </div>

        <!-- [VENTANA DERECHA (50%)]: PANEL DE HISTORIAL VIVO -->
        <div class="columna-derecha-pro">
            <div class="seccion-lista">
                <div style="margin-bottom: 12px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <h3 style="margin: 0; color: #004b93; font-weight: 800; text-transform: uppercase; font-size: 13px; letter-spacing: 0.3px;">🗂️ PROGRAMADOS PARA EDICIÓN</h3>
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <input type="date" id="filtroFechaLista" style="padding: 5px !important; border: 1px solid #cbd5e1 !important; font-size: 11px !important; border-radius: 4px; color:#334155; background:#ffffff !important; height:28px; box-sizing:border-box;">
                            <button onclick="cargarViajesExistentes()" class="btn-lupa" style="padding: 0 12px !important; font-size: 11px !important; height:28px;">🔍 Buscar</button>
                        </div>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <div style="position: relative; flex: 1;">
                            <input type="text" id="prg-filtro-placa" placeholder="🔍 Buscar placa..." oninput="prg_filtrarLista()" style="width: 100%; padding: 5px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 11px; color: #334155; box-sizing: border-box; height: 28px;">
                        </div>
                        <div style="position: relative; flex: 1;">
                            <input type="text" id="prg-filtro-ruta" placeholder="🔍 Buscar ruta..." oninput="prg_filtrarLista()" style="width: 100%; padding: 5px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 11px; color: #334155; box-sizing: border-box; height: 28px;">
                        </div>
                    </div>
                </div>
                
                <table class="tabla-constructor">
                    <thead>
                        <tr>
                            <th>Placa</th>
                            <th>Conductor</th>
                            <th style="text-align: left; padding-left: 8px;">Ruta</th>
                            <th>Salida</th>
                            <th>Estado</th>
                            <th>Editar</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoListaViajes"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>
