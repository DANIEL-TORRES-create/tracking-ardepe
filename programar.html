<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="estilos.css">
    <style>
        .seccion-lista { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .btn-lupa { padding: 5px 15px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; }
        .modo-masivo { background: #fdf6e3; padding: 15px; border: 1px dashed #d3af37; border-radius: 8px; margin-bottom: 20px; }
        .editando { border: 2px solid #f2994a !important; background: #fff4e5; }
        .tabla-constructor th { font-size: 11px; padding: 10px 5px; }
    </style>
</head>
<body>

<div class="card-container">
    <h2 class="titulo-seccion">📅 Programación de Viajes</h2>
    
    <div class="modo-masivo">
        <label style="font-weight: bold; font-size: 12px;">🚀 CARGA MASIVA (Pegar desde Excel: Placa | Conductor | Ruta | Fecha):</label>
        <textarea id="txtMasivo" placeholder="Copia y pega las filas de tu Excel aquí..." style="width: 100%; height: 50px; margin-top: 5px; font-size: 11px;"></textarea>
        <button id="btnProcesarMasivo" class="btn-lupa" style="margin-top: 5px; width: 100%; background: #27ae60;">Procesar Lote Masivo</button>
    </div>

    <div id="contenedorManual" class="barra-herramientas" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 10px; border-radius: 8px;">
        <input type="hidden" id="idEdicion"> 
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label style="font-weight: bold; font-size: 13px;">1. Ruta Maestra:</label>
            <div style="display: flex; align-items: center; gap: 10px;">
                <select id="selectRuta" style="padding: 10px; border-radius: 6px; flex-grow: 1; border: 1px solid #ccc;">
                    <option value="">Cargando rutas...</option>
                </select>
                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; background: #eee; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold;">
                    <input type="checkbox" id="checkRetorno"> ¿RET?
                </label>
            </div>
            <label style="font-weight: bold; font-size: 13px;">2. Salida Programada:</label>
            <input type="datetime-local" id="fechaSalida" style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label id="lblVehiculo" style="font-weight: bold; font-size: 13px;">3. Vehículo (Placa):</label>
            <input list="listaVehiculos" id="inputVehiculo" placeholder="Escribe placa..." style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
            <datalist id="listaVehiculos"></datalist>

            <label style="font-weight: bold; font-size: 13px;">4. Conductor:</label>
            <input list="listaConductores" id="inputConductor" placeholder="Escribe nombre..." style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
            <datalist id="listaConductores"></datalist>
        </div>
    </div>

    <table class="tabla-constructor">
        <thead>
            <tr>
                <th>Orden</th>
                <th style="text-align: left;">Punto</th>
                <th>Km</th>
                <th>Hora Estimada de Llegada</th>
                <th>Hora Estimada de Salida</th>
            </tr>
        </thead>
        <tbody id="cuerpoItinerario"></tbody>
    </table>

    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button id="btnProgramar" class="btn-guardar" style="flex-grow: 2; float: none;">🚀 Confirmar Viaje</button>
        <button id="btnCancelar" class="btn-cancelar" style="flex-grow: 1; float: none; margin: 0;">❌ Limpiar / Cancelar</button>
    </div>

    <div class="seccion-lista">
        <h3 style="margin: 0 0 15px 0; color: #333;">🗂️ Historial y Edición</h3>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
            <input type="date" id="filtroFechaLista" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
            <button onclick="cargarViajesExistentes()" class="btn-lupa">🔍 Buscar</button>
        </div>
        <table class="tabla-constructor" style="font-size: 12px;">
            <thead>
                <tr><th>Placa</th><th>Conductor</th><th>Ruta</th><th>Salida</th><th>Estado</th><th>Editar</th></tr>
            </thead>
            <tbody id="cuerpoListaViajes"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzv5b4fL0CNUSrBYaHmDe0KCYe_T6cMrhfTw9Gg_7BThEFBzSj4J8P_OR4kBbYXQnF4/exec";
    let rutasMaestras = [];

    geotab.addin.programar = (api, state) => {
        return {
            initialize(api, state, callback) {
                document.getElementById('filtroFechaLista').valueAsDate = new Date();
                
                // CARGA DE PLACAS DESDE GEOTAB
                api.call("Get", { 
                    typeName: "Device", 
                    search: { groups: [{ id: "b2798" }, { id: "b279A" }] } 
                }, (result) => {
                    const dl = document.getElementById("listaVehiculos");
                    dl.innerHTML = "";
                    const hoy = new Date();
                    const activos = result.filter(d => !d.activeTo || new Date(d.activeTo) > hoy);
                    activos.forEach(d => {
                        let opt = document.createElement("option");
                        opt.value = d.name;
                        dl.appendChild(opt);
                    });
                    document.getElementById("lblVehiculo").innerText = "3. Vehículo (" + activos.length + "):";
                });

                // CARGA DE CONDUCTORES DESDE GEOTAB
                api.call("Get", { typeName: "User" }, (result) => {
                    const dl = document.getElementById("listaConductores");
                    result.filter(u => u.isDriver).forEach(u => {
                        let opt = document.createElement("option");
                        opt.value = (u.firstName + " " + (u.lastName || "")).trim();
                        dl.appendChild(opt);
                    });
                });

                // CARGA DE RUTAS DESDE EL SHEET
                fetch(WEB_APP_URL).then(res => res.json()).then(data => {
                    rutasMaestras = data;
                    const sel = document.getElementById("selectRuta");
                    sel.innerHTML = '<option value="">-- Seleccionar --</option>';
                    data.forEach((r, i) => {
                        let opt = document.createElement("option"); opt.value = i; opt.textContent = r.nombre;
                        sel.appendChild(opt);
                    });
                    cargarViajesExistentes();
                });

                document.getElementById("selectRuta").addEventListener("change", calcular);
                document.getElementById("fechaSalida").addEventListener("change", calcular);
                document.getElementById("checkRetorno").addEventListener("change", calcular);
                callback();
            }
        };
    };

    function calcular() {
        const idx = document.getElementById("selectRuta").value;
        const salidaUser = document.getElementById("fechaSalida").value;
        if (idx === "" || !salidaUser) return;
        let puntos = JSON.parse(rutasMaestras[idx].puntos);
        if (document.getElementById("checkRetorno").checked) puntos = [...puntos].reverse();
        const cuerpo = document.getElementById("cuerpoItinerario");
        cuerpo.innerHTML = "";
        
        let f = salidaUser.split("T")[0].split("-");
        let h = salidaUser.split("T")[1].split(":");
        let tiempoBaseMs = new Date(f[0], f[1]-1, f[2], h[0], h[1]).getTime();
        let kmAcum = 0;

        puntos.forEach((p, i) => {
            let etaMs, etdMs;
            const perMs = (p.pernocte.split(":")[0]*3600000)+(p.pernocte.split(":")[1]*60000);
            if (i === 0) { etdMs = tiempoBaseMs; etaMs = etdMs - perMs; }
            else {
                const tieMs = (p.tiempo.split(":")[0]*3600000)+(p.tiempo.split(":")[1]*60000);
                etaMs = tiempoBaseMs + tieMs; 
                etdMs = etaMs + perMs;
                kmAcum += parseFloat(p.km || 0);
            }
            const row = cuerpo.insertRow();
            row.innerHTML = `<td>${i+1}</td><td>${p.name}</td><td>${kmAcum.toFixed(2)}</td><td>${new Date(etaMs).toLocaleString()}</td><td>${new Date(etdMs).toLocaleString()}</td>`;
            tiempoBaseMs = etdMs;
        });
    }

    async function cargarViajesExistentes() {
        const cuerpo = document.getElementById("cuerpoListaViajes");
        const filtro = document.getElementById("filtroFechaLista").value;
        cuerpo.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Buscando...</td></tr>";
        try {
            const res = await fetch(WEB_APP_URL + "?read=viajes&v=" + new Date().getTime());
            const viajes = await res.json();
            cuerpo.innerHTML = "";
            const filtrados = viajes.filter(v => v.etdOrigen && v.etdOrigen.toString().includes(filtro));
            if (filtrados.length === 0) {
                cuerpo.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Sin registros</td></tr>";
                return;
            }
            filtrados.forEach(v => {
                const tr = cuerpo.insertRow();
                let cond = (v.conductor === "N/A" || !v.conductor) ? "Sin Conductor" : v.conductor;
                let fStr = v.etdOrigen.toString().replace("'", "").replace("T", " ").split(".")[0];
                tr.innerHTML = `<td>${v.placa}</td><td>${cond}</td><td>${v.ruta}</td><td>${fStr}</td><td><b>${v.estado}</b></td>
                <td><button onclick='iniciarEdicion(${JSON.stringify(v)})' style='cursor:pointer;'>✏️</button></td>`;
            });
        } catch (e) { cuerpo.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Error de conexión</td></tr>"; }
    }

    function iniciarEdicion(v) {
        document.getElementById("contenedorManual").classList.add("editando");
        document.getElementById("idEdicion").value = v.idViaje || ""; // Asumiendo que guardas el ID en el Sheet
        document.getElementById("inputVehiculo").value = v.placa;
        document.getElementById("inputConductor").value = v.conductor;
        document.getElementById("btnProgramar").innerText = "🔄 Actualizar Programación";
        alert("Modo Edición: Ajusta los datos arriba y confirma.");
    }

    document.getElementById("btnProgramar").addEventListener("click", function() {
        const idEdit = document.getElementById("idEdicion").value;
        const btn = this;
        const vehiculo = document.getElementById("inputVehiculo").value;
        const rutaIdx = document.getElementById("selectRuta").value;
        const salida = document.getElementById("fechaSalida").value;
        if (!vehiculo || rutaIdx === "" || !salida) return alert("⚠️ Datos incompletos");
        
        btn.innerText = "⏳ Cargando...";
        btn.disabled = true;

        const itinerario = Array.from(document.querySelectorAll("#cuerpoItinerario tr")).map(f => ({
            orden: f.cells[0].innerText, punto: f.cells[1].innerText, km: f.cells[2].innerText, eta: f.cells[3].innerText, etd: f.cells[4].innerText
        }));

        fetch(WEB_APP_URL, {
            method: "POST",
            body: JSON.stringify({
                action: idEdit ? "editarViaje" : "programarViaje",
                idViaje: idEdit,
                vehiculo: vehiculo, 
                conductor: document.getElementById("inputConductor").value || "Sin Conductor",
                etdOrigen: "'" + salida.replace('T', ' '), 
                nombreRuta: rutasMaestras[rutaIdx].nombre + (document.getElementById("checkRetorno").checked ? " (RET)" : ""),
                itinerario: JSON.stringify(itinerario)
            })
        }).then(() => {
            alert("✅ ¡Éxito!");
            limpiar();
            cargarViajesExistentes();
        });
    });

    function limpiar() {
        document.getElementById("contenedorManual").classList.remove("editando");
        document.getElementById("idEdicion").value = "";
        document.getElementById("inputVehiculo").value = "";
        document.getElementById("inputConductor").value = "";
        document.getElementById("selectRuta").value = "";
        document.getElementById("fechaSalida").value = "";
        document.getElementById("cuerpoItinerario").innerHTML = "";
        document.getElementById("btnProgramar").innerText = "🚀 Confirmar Viaje";
        document.getElementById("btnProgramar").disabled = false;
    }

    document.getElementById("btnCancelar").addEventListener("click", limpiar);

    document.getElementById("btnProcesarMasivo").addEventListener("click", async function() {
        const texto = document.getElementById("txtMasivo").value;
        if (!texto) return alert("Pega los datos del Excel");
        this.innerText = "⏳ Procesando...";
        const lineas = texto.split("\n");
        for (let l of lineas) {
            const c = l.split("\t");
            if (c.length < 4) continue;
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "programarViaje", vehiculo: c[0].trim(), conductor: c[1].trim(), etdOrigen: "'" + c[3].trim(), nombreRuta: c[2].trim(), itinerario: "[]"
                })
            });
        }
        alert("✅ Carga masiva lista");
        document.getElementById("txtMasivo").value = "";
        this.innerText = "Procesar Lote Masivo";
        cargarViajesExistentes();
    });
</script>
</body>
</html>
