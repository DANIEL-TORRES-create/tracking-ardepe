<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="card-container">
    <h2 class="titulo-seccion">📅 Programación de Viajes</h2>
    
    <div class="barra-herramientas" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label style="font-weight: bold; font-size: 13px;">1. Ruta Maestra:</label>
            <div style="display: flex; align-items: center; gap: 10px;">
                <select id="selectRuta" style="padding: 10px; border-radius: 6px; flex-grow: 1; border: 1px solid #ccc;">
                    <option value="">Cargando rutas...</option>
                </select>
                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; background: #eee; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold;">
                    <input type="checkbox" id="checkRetorno" style="width: 16px; height: 16px; cursor: pointer;"> ¿VIAJE RETORNO?
                </label>
            </div>
            
            <label style="font-weight: bold; font-size: 13px;">2. Salida Programada (ETD Origen):</label>
            <input type="datetime-local" id="fechaSalida" style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label style="font-weight: bold; font-size: 13px;">3. Vehículo (Placas Activas):</label>
            <input list="listaVehiculos" id="inputVehiculo" placeholder="Escribe placa..." style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
            <datalist id="listaVehiculos"></datalist>

            <label style="font-weight: bold; font-size: 13px;">4. Conductor:</label>
            <input list="listaConductores" id="inputConductor" placeholder="Escribe conductor..." style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
            <datalist id="listaConductores"></datalist>
        </div>
    </div>

    <h3 style="color: #1a73e8; margin-top: 20px;">📋 Itinerario Estimado <span id="modoRuta" style="font-size: 12px; color: #e67e22; font-weight: bold;"></span></h3>
    <table class="tabla-constructor">
        <thead>
            <tr>
                <th style="width: 50px;">Orden</th>
                <th style="text-align: left;">Punto de Control</th>
                <th>Distancia Acum.</th>
                <th>Llegada (ETA)</th>
                <th>Salida (ETD)</th>
            </tr>
        </thead>
        <tbody id="cuerpoItinerario">
            <tr><td colspan="5" style="text-align:center; padding:20px; color:#999;">Seleccione ruta y fecha para calcular itinerario</td></tr>
        </tbody>
    </table>

    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button id="btnProgramar" class="btn-guardar" style="flex-grow: 2; float: none;">🚀 Confirmar Viaje</button>
        <button id="btnCancelar" class="btn-cancelar" style="flex-grow: 1; float: none; margin: 0;">❌ Limpiar</button>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwwtduJaS6lhzLqEE323RxMs8_NCVrTlpOiRtKMiDIsXhZr_e5e0ppH3WGExJ04z5fT/exec";
    let rutasMaestras = [];

    geotab.addin.programar = (api, state) => {
        return {
            initialize(api, state, callback) {
                
                // 1. CARGAR VEHÍCULOS (Sin filtros restrictivos para asegurar carga)
                api.call("Get", { 
                    typeName: "Device"
                }, (result) => {
                    const dl = document.getElementById("listaVehiculos");
                    dl.innerHTML = "";
                    
                    // Filtro manual: Solo los que no tienen fecha de fin o es el año 9999
                    const activos = result.filter(d => {
                        return !d.terminationDateTime || d.terminationDateTime.indexOf("9999") > -1;
                    });

                    activos.forEach(d => {
                        let opt = document.createElement("option");
                        opt.value = d.name;
                        dl.appendChild(opt);
                    });
                }, (e) => console.error("Error Vehículos:", e));

                // 2. CARGAR CONDUCTORES
                api.call("Get", { typeName: "User" }, (result) => {
                    const dl = document.getElementById("listaConductores");
                    dl.innerHTML = "";
                    result.filter(u => u.isDriver).forEach(u => {
                        let opt = document.createElement("option");
                        opt.value = (u.firstName + " " + (u.lastName || "")).trim();
                        dl.appendChild(opt);
                    });
                }, (e) => console.error("Error Conductores:", e));

                // 3. CARGAR RUTAS MAESTRAS
                fetch(WEB_APP_URL)
                    .then(res => res.json())
                    .then(data => {
                        rutasMaestras = data;
                        const sel = document.getElementById("selectRuta");
                        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
                        data.forEach((r, i) => {
                            let opt = document.createElement("option");
                            opt.value = i;
                            opt.textContent = r.nombre;
                            sel.appendChild(opt);
                        });
                    })
                    .catch(e => console.error("Error Google Sheets:", e));

                // EVENTOS DE CÁLCULO
                document.getElementById("checkRetorno").addEventListener("change", () => {
                    document.getElementById("modoRuta").innerText = document.getElementById("checkRetorno").checked ? "(VIAJE RETORNO)" : "";
                    calcular();
                });

                document.getElementById("selectRuta").addEventListener("change", calcular);
                document.getElementById("fechaSalida").addEventListener("change", calcular);

                function calcular() {
                    const idx = document.getElementById("selectRuta").value;
                    const salidaUser = document.getElementById("fechaSalida").value;
                    if (idx === "" || !salidaUser) return;

                    let puntos = JSON.parse(rutasMaestras[idx].puntos);
                    if (document.getElementById("checkRetorno").checked) puntos = [...puntos].reverse();

                    const cuerpo = document.getElementById("cuerpoItinerario");
                    cuerpo.innerHTML = "";
                    let tiempoBaseMs = new Date(salidaUser).getTime();
                    let kmAcum = 0;

                    puntos.forEach((p, i) => {
                        let etaMs, etdMs;
                        
                        if (i === 0) {
                            // Punto de Origen: ETD es la hora puesta por usuario
                            const [hP, mP] = p.pernocte.split(":").map(Number);
                            etdMs = tiempoBaseMs;
                            etaMs = etdMs - ((hP * 3600000) + (mP * 60000));
                        } else {
                            // Siguientes puntos: ETA = ETD anterior + tramo
                            const [hT, mT] = p.tiempo.split(":").map(Number);
                            etaMs = tiempoBaseMs + ((hT * 3600000) + (mT * 60000));
                            
                            const [hP, mP] = p.pernocte.split(":").map(Number);
                            etdMs = etaMs + ((hP * 3600000) + (mP * 60000));
                            kmAcum += parseFloat(p.km || 0);
                        }

                        const row = cuerpo.insertRow();
                        row.innerHTML = `
                            <td>${i+1}</td>
                            <td style="text-align:left; font-weight:bold;">${p.name}</td>
                            <td>${kmAcum.toFixed(1)} km</td>
                            <td style="color:#1a73e8;">${new Date(etaMs).toLocaleString()}</td>
                            <td style="font-weight:bold;">${new Date(etdMs).toLocaleString()}</td>
                        `;
                        tiempoBaseMs = etdMs;
                    });
                }

                // GUARDAR PROGRAMACIÓN
                document.getElementById("btnProgramar").addEventListener("click", () => {
                    const vehiculo = document.getElementById("inputVehiculo").value;
                    const conductor = document.getElementById("inputConductor").value;
                    const rutaIdx = document.getElementById("selectRuta").value;

                    if (!vehiculo || !conductor || rutaIdx === "") return alert("⚠️ Completa los datos requeridos.");
                    
                    document.getElementById("btnProgramar").innerText = "⏳ Guardando...";
                    
                    const filas = document.querySelectorAll("#cuerpoItinerario tr");
                    let itinerarioArray = [];
                    filas.forEach(f => {
                        if(f.cells.length > 1) {
                            itinerarioArray.push({
                                orden: f.cells[0].innerText,
                                punto: f.cells[1].innerText,
                                km: f.cells[2].innerText,
                                eta: f.cells[3].innerText,
                                etd: f.cells[4].innerText
                            });
                        }
                    });

                    fetch(WEB_APP_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            action: "programarViaje",
                            vehiculo: vehiculo,
                            conductor: conductor,
                            nombreRuta: rutasMaestras[rutaIdx].nombre + (document.getElementById("checkRetorno").checked ? " (RETORNO)" : ""),
                            itinerario: JSON.stringify(itinerarioArray)
                        })
                    }).then(() => { 
                        alert("✅ Viaje Programado con éxito"); 
                        location.reload(); 
                    }).catch(e => {
                        alert("Error al guardar");
                        document.getElementById("btnProgramar").innerText = "🚀 Confirmar Viaje";
                    });
                });

                document.getElementById("btnCancelar").addEventListener("click", () => location.reload());
                callback();
            }
        };
    };
</script>
</body>
</html>
