<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="card-container">
    <h2 class="titulo-seccion">📅 Programación de Viajes</h2>
    
    <div class="barra-herramientas" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label style="font-weight: bold;">1. Seleccionar Ruta Maestra:</label>
            <select id="selectRutaMaestra" style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
                <option value="">Cargando rutas...</option>
            </select>
            
            <label style="font-weight: bold;">2. Fecha y Hora de Salida:</label>
            <input type="datetime-local" id="fechaSalida" style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label style="font-weight: bold;">3. Vehículo (Placa):</label>
            <input list="listaVehiculos" id="inputVehiculo" placeholder="Buscar placa..." style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
            <datalist id="listaVehiculos"></datalist>

            <label style="font-weight: bold;">4. Conductor:</label>
            <input list="listaConductores" id="inputConductor" placeholder="Buscar conductor..." style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
            <datalist id="listaConductores"></datalist>
        </div>
    </div>

    <h3 style="color: #1a73e8; margin-top: 20px;">📋 Itinerario Estimado del Viaje</h3>
    <table class="tabla-constructor">
        <thead>
            <tr>
                <th>Orden</th>
                <th style="text-align: left;">Punto de Control</th>
                <th>Distancia Acum.</th>
                <th>Llegada Estimada (ETA)</th>
                <th>Salida Estimada (ETD)</th>
            </tr>
        </thead>
        <tbody id="cuerpoItinerario">
            <tr><td colspan="5" style="padding: 20px; color: #666;">Selecciona una ruta y fecha para calcular...</td></tr>
        </tbody>
    </table>

    <div style="margin-top: 20px;">
        <button id="btnProgramar" class="btn-guardar" style="width: 100%; float: none;">🚀 Confirmar y Programar Viaje</button>
    </div>
</div>

<script>
    // Aquí irá la lógica de Geotab y la conexión con el Sheet
    // Usaremos la misma WEB_APP_URL que en el Add-in 1
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwwtduJaS6lhzLqEE323RxMs8_NCVrTlpOiRtKMiDIsXhZr_e5e0ppH3WGExJ04z5fT/exec";
    
    let vehículos = [];
    let conductores = [];
    let rutasMaestras = [];

    geotab.addin.programar = (api, state) => {
        return {
            initialize(api, state, callback) {
                // 1. Cargar Vehículos de Geotab
                api.call("Get", { typeName: "Device" }, (result) => {
                    const dl = document.getElementById("listaVehiculos");
                    result.forEach(d => {
                        let opt = document.createElement("option");
                        opt.value = d.name; // Placa/Nombre
                        dl.appendChild(opt);
                    });
                });

                // 2. Cargar Conductores (Usuarios)
                api.call("Get", { typeName: "User" }, (result) => {
                    const dl = document.getElementById("listaConductores");
                    result.forEach(u => {
                        if(u.isDriver) {
                            let opt = document.createElement("option");
                            opt.value = `${u.firstName} ${u.lastName}`;
                            dl.appendChild(opt);
                        }
                    });
                });

                // 3. Cargar Rutas desde Google Sheets
                fetch(WEB_APP_URL)
                    .then(res => res.json())
                    .then(data => {
                        rutasMaestras = data;
                        const sel = document.getElementById("selectRutaMaestra");
                        sel.innerHTML = '<option value="">-- Seleccionar Ruta --</option>';
                        data.forEach((r, index) => {
                            let opt = document.createElement("option");
                            opt.value = index;
                            opt.textContent = r.nombre;
                            sel.appendChild(opt);
                        });
                    });

                // Evento al cambiar ruta o fecha para calcular ETA
                document.getElementById("selectRutaMaestra").addEventListener("change", calcularItinerario);
                document.getElementById("fechaSalida").addEventListener("change", calcularItinerario);

                function calcularItinerario() {
                    const rutaIdx = document.getElementById("selectRutaMaestra").value;
                    const salidaStr = document.getElementById("fechaSalida").value;
                    if (rutaIdx === "" || !salidaStr) return;

                    const rutaSel = rutasMaestras[rutaIdx];
                    const puntos = JSON.parse(rutaSel.puntos);
                    const cuerpo = document.getElementById("cuerpoItinerario");
                    cuerpo.innerHTML = "";

                    let tiempoAcumuladoMs = new Date(salidaStr).getTime();
                    let kmAcumulados = 0;

                    puntos.forEach((p, i) => {
                        // Sumar tiempo de tramo (excepto al primero)
                        if (i > 0) {
                            const [hTramo, mTramo] = p.tiempo.split(":").map(Number);
                            tiempoAcumuladoMs += (hTramo * 3600000) + (mTramo * 60000);
                        }
                        
                        let eta = new Date(tiempoAcumuladoMs);
                        kmAcumulados += parseFloat(p.km || 0);

                        // Sumar tiempo de pernocte/parada para el ETD
                        const [hParada, mParada] = p.pernocte.split(":").map(Number);
                        let etdMs = tiempoAcumuladoMs + (hParada * 3600000) + (mParada * 60000);
                        let etd = new Date(etdMs);

                        const row = cuerpo.insertRow();
                        row.innerHTML = `
                            <td>${i + 1}</td>
                            <td style="text-align: left; font-weight: bold;">${p.name}</td>
                            <td>${kmAcumulados.toFixed(1)} km</td>
                            <td style="color: #1a73e8; font-weight: bold;">${eta.toLocaleString()}</td>
                            <td style="color: #666;">${etd.toLocaleString()}</td>
                        `;
                        
                        // El ETD de este punto es la base para el tramo siguiente
                        tiempoAcumuladoMs = etdMs;
                    });
                }

                callback();
            }
        };
    };
</script>
</body>
</html>
