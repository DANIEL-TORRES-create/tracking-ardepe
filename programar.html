<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="card-container">
    <h2 class="titulo-seccion">📅 Programación de Viajes</h2>
    
    <div class="barra-herramientas" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label style="font-weight: bold;">1. Ruta Maestra:</label>
            <div style="display: flex; gap: 5px;">
                <select id="selectRuta" style="padding: 10px; border-radius: 6px; flex-grow: 1;">
                    <option value="">Cargando rutas...</option>
                </select>
                <button id="btnRetorno" style="background: #f39c12; color: white; border: none; border-radius: 6px; padding: 0 10px; cursor: pointer; font-weight: bold;" title="Invertir Ruta">🔄 Retorno</button>
            </div>
            
            <label style="font-weight: bold;">2. Salida Programada (ETD Origen):</label>
            <input type="datetime-local" id="fechaSalida" style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label style="font-weight: bold;">3. Vehículo (Solo Activos):</label>
            <input list="listaVehiculos" id="inputVehiculo" placeholder="Buscar placa..." style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
            <datalist id="listaVehiculos"></datalist>

            <label style="font-weight: bold;">4. Conductor:</label>
            <input list="listaConductores" id="inputConductor" placeholder="Buscar conductor..." style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
            <datalist id="listaConductores"></datalist>
        </div>
    </div>

    <h3 style="color: #1a73e8; margin-top: 20px;">📋 Itinerario Estimado <span id="modoRuta" style="font-size: 12px; color: #666;">(Normal)</span></h3>
    <table class="tabla-constructor">
        <thead>
            <tr>
                <th>Orden</th>
                <th style="text-align: left;">Punto de Control</th>
                <th>Distancia Acum.</th>
                <th>Llegada (ETA)</th>
                <th>Salida (ETD)</th>
            </tr>
        </thead>
        <tbody id="cuerpoItinerario"></tbody>
    </table>

    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button id="btnProgramar" class="btn-guardar" style="flex-grow: 2; float: none;">🚀 Confirmar Viaje</button>
        <button id="btnCancelar" class="btn-cancelar" style="flex-grow: 1; float: none; margin: 0;">❌ Limpiar</button>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwwtduJaS6lhzLqEE323RxMs8_NCVrTlpOiRtKMiDIsXhZr_e5e0ppH3WGExJ04z5fT/exec";
    let rutasMaestras = [];
    let rutaSeleccionada = null;
    let esRetorno = false;

    geotab.addin.programar = (api, state) => {
        return {
            initialize(api, state, callback) {
                // FILTRO DE VEHÍCULOS ACTIVOS
                api.call("Get", { 
                    typeName: "Device",
                    search: { terminationDateTime: "9999-12-31T23:59:59.000Z" } // Solo dispositivos no dados de baja
                }, (result) => {
                    const dl = document.getElementById("listaVehiculos");
                    result.forEach(d => {
                        let opt = document.createElement("option");
                        opt.value = d.name;
                        dl.appendChild(opt);
                    });
                });

                api.call("Get", { typeName: "User" }, (result) => {
                    const dl = document.getElementById("listaConductores");
                    result.filter(u => u.isDriver).forEach(u => {
                        let opt = document.createElement("option");
                        opt.value = `${u.firstName} ${u.lastName}`;
                        dl.appendChild(opt);
                    });
                });

                fetch(WEB_APP_URL).then(res => res.json()).then(data => {
                    rutasMaestras = data;
                    const sel = document.getElementById("selectRuta");
                    sel.innerHTML = '<option value="">-- Seleccionar --</option>';
                    data.forEach((r, i) => {
                        let opt = document.createElement("option"); opt.value = i; opt.textContent = r.nombre;
                        sel.appendChild(opt);
                    });
                });

                document.getElementById("btnRetorno").addEventListener("click", () => {
                    esRetorno = !esRetorno;
                    document.getElementById("modoRuta").innerText = esRetorno ? "(RETORNO)" : "(NORMAL)";
                    calcular();
                });

                document.getElementById("selectRuta").addEventListener("change", calcular);
                document.getElementById("fechaSalida").addEventListener("change", calcular);

                function calcular() {
                    const idx = document.getElementById("selectRuta").value;
                    const salidaUser = document.getElementById("fechaSalida").value;
                    if (idx === "" || !salidaUser) return;

                    let puntos = JSON.parse(rutasMaestras[idx].puntos);
                    if (esRetorno) puntos = [...puntos].reverse(); // Invertir si es retorno

                    const cuerpo = document.getElementById("cuerpoItinerario");
                    cuerpo.innerHTML = "";

                    let tiempoBaseMs = new Date(salidaUser).getTime();
                    let kmAcum = 0;

                    puntos.forEach((p, i) => {
                        let etaMs, etdMs;

                        if (i === 0) {
                            // LÓGICA PUNTO 1: El ETD es la hora del cliente. ETA es ETD menos su propio pernocte.
                            const [hP, mP] = p.pernocte.split(":").map(Number);
                            etdMs = tiempoBaseMs;
                            etaMs = etdMs - ((hP * 3600000) + (mP * 60000));
                        } else {
                            // LÓGICA RESTO: ETA = ETD anterior + tiempo tramo. ETD = ETA + pernocte.
                            const [hT, mT] = p.tiempo.split(":").map(Number);
                            etaMs = tiempoBaseMs + ((hT * 3600000) + (mT * 60000));
                            
                            const [hP, mP] = p.pernocte.split(":").map(Number);
                            etdMs = etaMs + ((hP * 3600000) + (mP * 60000));
                            
                            kmAcum += parseFloat(p.km || 0);
                        }

                        const row = cuerpo.insertRow();
                        row.innerHTML = `
                            <td>${i + 1}</td>
                            <td style="text-align: left; font-weight: bold;">${p.name}</td>
                            <td>${kmAcum.toFixed(1)} km</td>
                            <td style="color: #1a73e8;">${new Date(etaMs).toLocaleString()}</td>
                            <td style="font-weight: bold;">${new Date(etdMs).toLocaleString()}</td>
                        `;
                        tiempoBaseMs = etdMs;
                    });
                }
                
                callback();
            }
        };
    };
</script>
</body>
</html>
