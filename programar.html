<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="estilos.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .seccion-lista { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .btn-lupa { padding: 5px 15px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 4px; font-weight: bold; }
        .modo-masivo { background: #f0f7ff; padding: 15px; border: 1px solid #1a73e8; border-radius: 8px; margin-bottom: 20px; }
        .editando { border: 2px solid #f2994a !important; background: #fff4e5; }
        .input-file-custom { padding: 8px; background: white; border: 1px solid #ccc; border-radius: 4px; flex-grow: 1; }
        .btn-descarga { background: #27ae60; color: white; padding: 8px 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; }
        .error-log { background: #fee; color: #b00; padding: 10px; border-radius: 4px; margin-top: 10px; display: none; font-size: 12px; border: 1px solid #b00; line-height: 1.5; }
        .tabla-constructor th { font-size: 11px; }
    </style>
</head>
<body>

<div class="card-container">
    <h2 class="titulo-seccion">📅 Programación de Viajes</h2>
    
    <div class="modo-masivo">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <label style="font-weight: bold; font-size: 13px; color: #1a73e8;">🚀 CARGA MASIVA EXCEL</label>
            <button onclick="exportarPlantilla()" class="btn-descarga">📥 Descargar Plantilla</button>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <input type="file" id="inputExcel" class="input-file-custom" accept=".xlsx, .xls">
            <button id="btnProcesarExcel" class="btn-lupa" style="background: #27ae60;">Validar y Subir</button>
        </div>
        <div id="errorLog" class="error-log"></div>
    </div>

    <div id="contenedorManual" class="barra-herramientas" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 10px; border-radius: 8px;">
        <input type="hidden" id="idEdicion"> 
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label style="font-weight: bold; font-size: 13px;">1. Ruta Maestra:</label>
            <div style="display: flex; align-items: center; gap: 10px;">
                <select id="selectRuta" style="padding: 10px; border-radius: 6px; flex-grow: 1; border: 1px solid #ccc;"><option value="">Cargando...</option></select>
                <label style="font-size: 11px; font-weight: bold;"><input type="checkbox" id="checkRetorno"> ¿RET?</label>
            </div>
            <label style="font-weight: bold; font-size: 13px;">2. Salida Programada:</label>
            <input type="datetime-local" id="fechaSalida" style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label id="lblVehiculo" style="font-weight: bold; font-size: 13px;">3. Vehículo (Placa):</label>
            <input list="listaVehiculos" id="inputVehiculo" placeholder="Placa..." style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
            <datalist id="listaVehiculos"></datalist>
            <label style="font-weight: bold; font-size: 13px;">4. Conductor:</label>
            <input list="listaConductores" id="inputConductor" placeholder="Conductor..." style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
            <datalist id="listaConductores"></datalist>
        </div>
    </div>

    <table class="tabla-constructor">
        <thead>
            <tr>
                <th>Orden</th>
                <th style="text-align: left;">Punto</th>
                <th>Km</th>
                <th>Hora Estimada de Llegada</th>
                <th>Hora Estimada de Salida</th>
            </tr>
        </thead>
        <tbody id="cuerpoItinerario"></tbody>
    </table>

    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button id="btnProgramar" class="btn-guardar" style="flex-grow: 2;">🚀 Confirmar Viaje</button>
        <button id="btnCancelar" class="btn-cancelar" style="flex-grow: 1;">❌ Limpiar / Cancelar</button>
    </div>

    <div class="seccion-lista">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0; color: #333;">🗂️ Historial y Edición</h3>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="date" id="filtroFechaLista" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
                <button onclick="cargarViajesExistentes()" class="btn-lupa">🔍 Buscar</button>
            </div>
        </div>
        <table class="tabla-constructor" style="font-size: 12px;">
            <thead>
                <tr><th>Placa</th><th>Conductor</th><th>Ruta</th><th>Salida</th><th>Estado</th><th>Editar</th></tr>
            </thead>
            <tbody id="cuerpoListaViajes"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzsBCgWyyBYoR9oseGaU5aPilYzWJRLM_X9Q6BBYnza-HnD6Sb_3HGmSskb3E42elAB/exec";
    let rutasMaestras = [];
    let placasValidas = [];

    geotab.addin.programar = (api, state) => {
        return {
            initialize(api, state, callback) {
                document.getElementById('filtroFechaLista').valueAsDate = new Date();
                
                api.call("Get", { typeName: "Device", search: { groups: [{ id: "b2798" }, { id: "b279A" }] } }, (res) => {
                    const dl = document.getElementById("listaVehiculos");
                    placasValidas = res.filter(d => !d.activeTo || new Date(d.activeTo) > new Date()).map(d => d.name);
                    placasValidas.forEach(p => { let o = document.createElement("option"); o.value = p; dl.appendChild(o); });
                });

                api.call("Get", { typeName: "User" }, (res) => {
                    const dl = document.getElementById("listaConductores");
                    res.filter(u => u.isDriver).forEach(u => { let o = document.createElement("option"); o.value = (u.firstName + " " + (u.lastName || "")).trim(); dl.appendChild(o); });
                });

                fetch(WEB_APP_URL).then(r => r.json()).then(d => {
                    rutasMaestras = d;
                    const s = document.getElementById("selectRuta");
                    s.innerHTML = '<option value="">-- Seleccionar --</option>';
                    d.forEach((r, i) => { let o = document.createElement("option"); o.value = i; o.textContent = r.nombre; s.appendChild(o); });
                    cargarViajesExistentes();
                });

                document.getElementById("selectRuta").addEventListener("change", calcular);
                document.getElementById("fechaSalida").addEventListener("change", calcular);
                document.getElementById("checkRetorno").addEventListener("change", calcular);
                callback();
            }
        };
    };

    function exportarPlantilla() {
        const wb = XLSX.utils.book_new();
        const wsData = [["PLACA", "CONDUCTOR", "RUTA", "FECHA_ETD"], ["ABC-123", "JUAN PEREZ", "LIMA-ICA", "'2026-04-15 22:00"]];
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        const wsInst = XLSX.utils.aoa_to_sheet([["INSTRUCCIONES"], ["1. Solo use la hoja 'Programación'"], ["2. Fecha con comilla: '2026-04-15 22:00"]]);
        XLSX.utils.book_append_sheet(wb, ws, "Programación");
        XLSX.utils.book_append_sheet(wb, wsInst, "Instrucciones");
        XLSX.writeFile(wb, "Plantilla_Viajes.xlsx");
    }

    document.getElementById("btnProcesarExcel").addEventListener("click", function() {
        const fileInput = document.getElementById("inputExcel");
        const log = document.getElementById("errorLog");
        if (!fileInput.files[0]) return alert("Seleccione archivo");
        log.style.display = "none"; log.innerHTML = "";
        const reader = new FileReader();
        reader.onload = async (e) => {
            const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            const sheet = workbook.Sheets["Programación"];
            if (!sheet) return alert("No se encontró hoja 'Programación'");
            const jsonData = XLSX.utils.sheet_to_json(sheet);
            let errores = [];
            const nombresRutas = rutasMaestras.map(r => r.nombre);
            jsonData.forEach((f, i) => {
                let n = i + 2;
                if (!placasValidas.includes(f.PLACA)) errores.push(`Fila ${n}: Placa '${f.PLACA}' inválida.`);
                if (!nombresRutas.includes(f.RUTA)) errores.push(`Fila ${n}: Ruta '${f.RUTA}' no existe.`);
                if (!f.FECHA_ETD) errores.push(`Fila ${n}: Falta fecha.`);
            });
            if (errores.length > 0) { log.style.display = "block"; log.innerHTML = errores.join("<br>"); return; }
            for (let f of jsonData) {
                await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "programarViaje", vehiculo: f.PLACA, conductor: f.CONDUCTOR || "Sin Conductor", etdOrigen: f.FECHA_ETD.toString().startsWith("'") ? f.FECHA_ETD : "'" + f.FECHA_ETD, nombreRuta: f.RUTA, itinerario: "[]" }) });
            }
            alert("✅ Carga masiva lista"); location.reload();
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    });

    function calcular() {
        const idx = document.getElementById("selectRuta").value;
        const salidaUser = document.getElementById("fechaSalida").value;
        if (idx === "" || !salidaUser) return;
        let puntos = JSON.parse(rutasMaestras[idx].puntos);
        if (document.getElementById("checkRetorno").checked) puntos = [...puntos].reverse();
        const cuerpo = document.getElementById("cuerpoItinerario");
        cuerpo.innerHTML = "";
        let f = salidaUser.split("T")[0].split("-"), h = salidaUser.split("T")[1].split(":");
        let tiempoMs = new Date(f[0], f[1]-1, f[2], h[0], h[1]).getTime(), kmAcum = 0;
        puntos.forEach((p, i) => {
            let perMs = (p.pernocte.split(":")[0]*3600000)+(p.pernocte.split(":")[1]*60000), eta, etd;
            if (i === 0) { etd = tiempoMs; eta = etd - perMs; }
            else { 
                let tieMs = (p.tiempo.split(":")[0]*3600000)+(p.tiempo.split(":")[1]*60000); 
                eta = tiempoMs + tieMs; etd = eta + perMs; kmAcum += parseFloat(p.km || 0); 
            }
            cuerpo.insertRow().innerHTML = `<td>${i+1}</td><td>${p.name}</td><td>${kmAcum.toFixed(2)}</td><td>${new Date(eta).toLocaleString()}</td><td>${new Date(etd).toLocaleString()}</td>`;
            tiempoMs = etd;
        });
    }

    async function cargarViajesExistentes() {
        const c = document.getElementById("cuerpoListaViajes"), f = document.getElementById("filtroFechaLista").value;
        c.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Buscando...</td></tr>";
        const res = await fetch(WEB_APP_URL + "?read=viajes&v=" + new Date().getTime());
        const viajes = await res.json();
        c.innerHTML = "";
        const filtrados = viajes.filter(v => v.etdOrigen && v.etdOrigen.toString().includes(f));
        if (filtrados.length === 0) return c.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Sin registros</td></tr>";
        filtrados.forEach(v => {
            let tr = c.insertRow();
            tr.innerHTML = `<td>${v.placa}</td><td>${v.conductor}</td><td>${v.ruta}</td><td>${v.etdOrigen.toString().replace("'","").replace("T"," ")}</td><td><b>${v.estado}</b></td><td><button onclick='iniciarEdicion(${JSON.stringify(v)})'>✏️</button></td>`;
        });
    }

    function iniciarEdicion(v) {
        document.getElementById("contenedorManual").classList.add("editando");
        document.getElementById("idEdicion").value = v.idViaje;
        document.getElementById("inputVehiculo").value = v.placa;
        document.getElementById("inputConductor").value = v.conductor;
        document.getElementById("btnProgramar").innerText = "🔄 Actualizar Programación";
        alert("Modo Edición Activado.");
    }

    document.getElementById("btnProgramar").addEventListener("click", function() {
        const id = document.getElementById("idEdicion").value, v = document.getElementById("inputVehiculo").value, r = document.getElementById("selectRuta").value, s = document.getElementById("fechaSalida").value;
        if (!v || r === "" || !s) return alert("Faltan datos");
        this.innerText = "⏳ Cargando..."; this.disabled = true;
        const itinerario = Array.from(document.querySelectorAll("#cuerpoItinerario tr")).map(f => ({ orden: f.cells[0].innerText, punto: f.cells[1].innerText, km: f.cells[2].innerText, eta: f.cells[3].innerText, etd: f.cells[4].innerText }));
        fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: id ? "editarViaje" : "programarViaje", idViaje: id, vehiculo: v, conductor: document.getElementById("inputConductor").value, etdOrigen: "'" + s.replace('T', ' '), nombreRuta: rutasMaestras[r].nombre, itinerario: JSON.stringify(itinerario) }) }).then(() => { alert("✅ Éxito"); location.reload(); });
    });

    document.getElementById("btnCancelar").addEventListener("click", () => location.reload());
</script>
</body>
</html>
