<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1100px; margin: auto; }
        .header-tools { display: flex; gap: 15px; margin-bottom: 20px; background: #e8f0fe; padding: 15px; border-radius: 8px; align-items: flex-end; border-left: 5px solid #1a73e8; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #1a73e8; color: white; padding: 10px 20px; height: 40px; }
        .btn-save { background: #28a745; color: white; padding: 12px 30px; float: right; margin-top: 20px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1a73e8; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .calc-val { color: #1a73e8; font-weight: bold; font-family: monospace; }
        .input-human { width: 85px; border: 2px solid #3498db; text-align: center; font-weight: bold; color: #d35400; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛠️ Constructor de Ruta ARDEPE (Filtro ID: b4A3)</h2>
    
    <div class="header-tools">
        <div class="input-group">
            <label>Nombre de la Ruta:</label>
            <input type="text" id="nombreRuta" placeholder="Ej: LIMA - HUANCAVELICA" style="width: 250px;">
        </div>
        <div class="input-group">
            <label>Seleccionar Zona del Tipo b4A3:</label>
            <select id="selectorZonas" style="width: 400px;">
                <option value="">Cargando zonas autorizadas...</option>
            </select>
        </div>
        <button class="btn-add" id="btnAgregar">➕ Añadir Punto</button>
    </div>

    <table id="tablaRuta">
        <thead>
            <tr>
                <th>Orden</th>
                <th>Punto de Control</th>
                <th>Distancia (Km)</th>
                <th>Sistema (HH:mm)</th>
                <th>Ajuste Humano (HH:mm)</th>
                <th>Pernocte (HH:mm)</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoRuta"></tbody>
    </table>

    <button class="btn-save">💾 Guardar Configuración</button>
</div>

<script>
    let zonasFiltradas = [];
    let rutaActual = [];

    function formatTime(decimal) {
        let h = Math.floor(decimal);
        let m = Math.round((decimal - h) * 60);
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    }

    function getHaversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    geotab.addin.configurar = (api, state) => {
        return {
            initialize(api, state, callback) {
                // LLAMADA ESTRICTA: Solo zonas que pertenezcan al ID b4A3
                api.call("Get", {
                    typeName: "Zone",
                    search: { 
                        zoneTypeIds: ["b4A3"] // Este es el filtro de ID que me pasaste
                    }
                }, (result) => {
                    const select = document.getElementById("selectorZonas");
                    
                    // Doble validación en el cliente por si la API devuelve de más
                    zonasFiltradas = result.filter(z => {
                        return z.zoneTypes.some(t => t.id === "b4A3");
                    }).sort((a, b) => a.name.localeCompare(b.name));

                    select.innerHTML = `<option value="">-- Selecciona entre las ${zonasFiltradas.length} zonas de ARDEPE --</option>`;
                    zonasFiltradas.forEach(z => {
                        let opt = document.createElement("option");
                        opt.value = z.id;
                        opt.text = z.name;
                        select.appendChild(opt);
                    });
                });

                document.getElementById("btnAgregar").addEventListener("click", () => {
                    const idSel = document.getElementById("selectorZonas").value;
                    if (!idSel) return;

                    const zonaData = zonasFiltradas.find(z => z.id === idSel);
                    const previo = rutaActual[rutaActual.length - 1];
                    
                    let km = 0;
                    if (previo) {
                        km = getHaversine(previo.y, previo.x, zonaData.y, zonaData.x);
                    }

                    const tSist = km / 60; 
                    const hito = {
                        name: zonaData.name,
                        y: zonaData.y, x: zonaData.x,
                        km: km,
                        tiempo: formatTime(tSist)
                    };

                    rutaActual.push(hito);
                    updateUI();
                });

                function updateUI() {
                    const cuerpo = document.getElementById("cuerpoRuta");
                    cuerpo.innerHTML = "";
                    rutaActual.forEach((item, i) => {
                        const row = cuerpo.insertRow();
                        row.innerHTML = `
                            <td>${i + 1}</td>
                            <td><strong>${item.name}</strong></td>
                            <td class="calc-val">${item.km.toFixed(2)} km</td>
                            <td class="calc-val">${item.tiempo}</td>
                            <td><input type="text" class="input-human" value="${item.tiempo}"></td>
                            <td><input type="text" class="input-human" value="00:30"></td>
                            <td><button onclick="borrar(${i})" style="background:none; color:red;">🗑️</button></td>
                        `;
                    });
                }

                window.borrar = (idx) => {
                    rutaActual.splice(idx, 1);
                    updateUI();
                };

                callback();
            }
        };
    };
</script>
</body>
</html>
