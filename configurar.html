<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="card-container">
    <h2 class="titulo-seccion">🛠️ Constructor de Ruta</h2>
    
    <div class="barra-herramientas">
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-weight: bold; font-size: 13px;">Nombre de la Ruta:</label>
            <input type="text" id="nombreRuta" placeholder="Ej: LIMA - HUANCAVELICA" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 220px;">
        </div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label id="lblZonas" style="font-weight: bold; font-size: 13px;">Buscando zonas...</label>
            <input list="listaZonas" id="buscadorZonas" placeholder="Escribe para buscar..." style="padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 350px;">
            <datalist id="listaZonas"></datalist>
        </div>
        <button id="btnAgregar" style="background: #1a73e8; color: white; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; height: 40px;">➕ Añadir Punto</button>
    </div>

    <table class="tabla-constructor">
        <thead>
            <tr>
                <th style="border-radius: 6px 0 0 0;">Orden</th>
                <th style="text-align: left;">Punto de Control</th>
                <th>Distancia (Km)</th>
                <th>Tiempo Tramo (HH:mm)</th>
                <th>Pernocte (HH:mm)</th>
                <th style="border-radius: 0 6px 0 0;">Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoRuta"></tbody>
    </table>

    <button id="btnGuardar" class="btn-guardar">💾 Guardar en Google Sheets</button>
    <div style="clear: both;"></div>

    <div style="margin-top: 40px; border-top: 2px dashed #ccc; padding-top: 20px;">
        <h3 style="color: #1a73e8;">📂 Rutas Guardadas en la Nube</h3>
        <table class="tabla-constructor">
            <thead>
                <tr>
                    <th>Nombre de Ruta</th>
                    <th>Puntos</th>
                    <th>Fecha</th>
                    <th>Cargar</th>
                </tr>
            </thead>
            <tbody id="listaRutasGuardadas"></tbody>
        </table>
    </div>
</div>

<script>
    let zonasFiltradas = [];
    let rutaActual = [];
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwwtduJaS6lhzLqEE323RxMs8_NCVrTlpOiRtKMiDIsXhZr_e5e0ppH3WGExJ04z5fT/exec";

    function formatTime(decimal) {
        if (!decimal || isNaN(decimal) || decimal <= 0) return "00:00";
        let h = Math.floor(decimal);
        let m = Math.round((decimal - h) * 60);
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    }

    function getHaversine(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return 0;
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    async function cargarRutas() {
        const listaUI = document.getElementById("listaRutasGuardadas");
        try {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();
            listaUI.innerHTML = "";
            data.forEach(r => {
                const row = listaUI.insertRow();
                let ptsArray = JSON.parse(r.puntos);
                row.innerHTML = `
                    <td style="text-align:left; font-weight:bold;">${r.nombre}</td>
                    <td>${ptsArray.length}</td>
                    <td>${r.fecha}</td>
                    <td><button onclick='cargarParaEditar(${r.puntos}, "${r.nombre}")' style="cursor:pointer; border:none; background:none; font-size:18px;">✏️</button></td>
                `;
            });
        } catch(e) { listaUI.innerHTML = "<tr><td colspan='4'>Sincronizando con la nube...</td></tr>"; }
    }

    geotab.addin.configurar = (api, state) => {
        return {
            initialize(api, state, callback) {
                api.call("Get", { typeName: "Zone", search: { zoneTypeIds: ["b4A3"] } }, (result) => {
                    zonasFiltradas = result.filter(z => z.zoneTypes && z.zoneTypes.some(t => t.id === "b4A3")).sort((a,b)=>a.name.localeCompare(b.name));
                    document.getElementById("lblZonas").innerText = `Escribe zona (${zonasFiltradas.length}):`;
                    const datalist = document.getElementById("listaZonas");
                    zonasFiltradas.forEach(z => {
                        let opt = document.createElement("option"); opt.value = z.name; datalist.appendChild(opt);
                    });
                });

                cargarRutas();

                document.getElementById("btnAgregar").addEventListener("click", () => {
                    const inputBusqueda = document.getElementById("buscadorZonas");
                    const zonaSel = zonasFiltradas.find(z => z.name === inputBusqueda.value);
                    if (!zonaSel) return;

                    // CORRECCIÓN DE COORDENADAS: Buscamos en todas las propiedades posibles de Geotab
                    let lat = 0, lon = 0;
                    if (zonaSel.center) { lat = zonaSel.center.y; lon = zonaSel.center.x; }
                    else if (zonaSel.y) { lat = zonaSel.y; lon = zonaSel.x; }
                    else if (zonaSel.points && zonaSel.points[0]) { lat = zonaSel.points[0].y; lon = zonaSel.points[0].x; }

                    const previo = rutaActual[rutaActual.length - 1];
                    let km = (previo && lat !== 0) ? getHaversine(previo.lat, previo.lon, lat, lon) : 0;
                    let tiempoCalculado = formatTime(km / 60);

                    rutaActual.push({ 
                        name: zonaSel.name, 
                        lat: lat, 
                        lon: lon, 
                        km: km.toFixed(2), 
                        tiempo: tiempoCalculado,
                        pernocte: "00:30" 
                    });

                    inputBusqueda.value = ""; 
                    updateUI();
                });

                document.getElementById("btnGuardar").addEventListener("click", async () => {
                    const nombre = document.getElementById("nombreRuta").value.trim();
                    if (!nombre || rutaActual.length === 0) return alert("Faltan datos");
                    
                    const filas = document.querySelectorAll("#cuerpoRuta tr");
                    const puntosFinales = rutaActual.map((p, i) => {
                        const inputs = filas[i].querySelectorAll("input");
                        return {
                            ...p,
                            tiempo: inputs[0] ? inputs[0].value : (p.tiempo || "00:00"),
                            pernocte: inputs[1] ? inputs[1].value : "00:30"
                        };
                    });

                    document.getElementById("btnGuardar").innerText = "⏳ Guardando...";
                    fetch(WEB_APP_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "write", nombre: nombre, puntos: JSON.stringify(puntosFinales) })
                    }).then(() => { alert("✅ Guardado en Google Sheets"); location.reload(); });
                });

                window.cargarParaEditar = (pts, nombre) => {
                    document.getElementById("nombreRuta").value = nombre;
                    rutaActual = pts; 
                    updateUI();
                    window.scrollTo(0,0);
                };

                function updateUI() {
                    const cuerpo = document.getElementById("cuerpoRuta");
                    cuerpo.innerHTML = "";
                    rutaActual.forEach((item, i) => {
                        const row = cuerpo.insertRow();
                        const esPrimero = (i === 0);
                        row.innerHTML = `
                            <td>${i + 1}</td>
                            <td style="text-align: left; font-weight: bold;">${item.name}</td>
                            <td>${esPrimero ? '-' : item.km + ' km'}</td>
                            <td>${esPrimero ? '-' : '<input type="text" class="input-tiempo" value="' + item.tiempo + '">'}</td>
                            <td><input type="text" class="input-tiempo" value="${item.pernocte}"></td>
                            <td><button onclick="borrar(${i})" style="color:red; background:none; border:none; cursor:pointer; font-size:18px;">🗑️</button></td>
                        `;
                    });
                }
                window.borrar = (idx) => { rutaActual.splice(idx, 1); updateUI(); };
                callback();
            }
        };
    };
</script>
</body>
</html>
