<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #ccc; padding: 15px; border-radius: 5px; background: #fafafa; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #004a99; color: white; }
        .error-msg { color: red; font-weight: bold; padding: 10px; border: 1px solid red; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🛠️ Configuración de Ruta (ID: bB)</h3>
        <div id="status">⏳ Conectando con la API de Geotab...</div>
        
        <table id="tabla" style="display:none;">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Punto de Control</th>
                    <th>Viaje (Min)</th>
                    <th>Pernocte (Min)</th>
                </tr>
            </thead>
            <tbody id="cuerpo"></tbody>
        </table>
    </div>

    <script>
        geotab.addin.configurar = (api, state) => {
            return {
                initialize(api, state, callback) {
                    console.log("Iniciando Add-in...");
                    
                    // Intentamos traer la ruta directamente por su ID único
                    api.call("Get", {
                        typeName: "Route",
                        search: { id: "bB" }
                    }, function(result) {
                        var status = document.getElementById("status");
                        
                        if (result && result.length > 0) {
                            var ruta = result[0];
                            var puntos = ruta.routePlanItem;
                            var cuerpo = document.getElementById("cuerpo");
                            
                            status.innerHTML = "✅ <strong>Ruta:</strong> " + ruta.name;
                            
                            puntos.forEach(function(p, i) {
                                var row = cuerpo.insertRow();
                                row.innerHTML = "<td>"+(i+1)+"</td><td>"+p.zone.name+"</td><td><input type='number' value='60' style='width:50px'></td><td><input type='number' value='30' style='width:50px'></td>";
                            });
                            
                            document.getElementById("tabla").style.display = "table";
                        } else {
                            status.innerHTML = "<div class='error-msg'>❌ No se encontró la ruta bB. Verifica que el ID sea correcto en esta base de datos.</div>";
                        }
                        callback();
                    }, function(error) {
                        document.getElementById("status").innerHTML = "<div class='error-msg'>⚠️ Error de API: " + error + "</div>";
                        callback();
                    });
                }
            };
        };
    </script>
</body>
</html>
