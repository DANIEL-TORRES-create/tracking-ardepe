<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: monospace; background: #222; color: #00ff00; padding: 20px; }
        .console { border: 1px solid #00ff00; padding: 15px; border-radius: 5px; }
        .label { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="console">
        <h3>🔍 DIAGNÓSTICO DE RUTA (ID: bB)</h3>
        <p id="res">Consultando a MyGeotab...</p>
        <hr>
        <div id="debug"></div>
    </div>

    <script>
        geotab.addin.configurar = (api, state) => {
            return {
                initialize(api, state, callback) {
                    api.call("Get", {
                        typeName: "Route",
                        search: { id: "bB" }
                    }, function(result) {
                        var res = document.getElementById("res");
                        var debug = document.getElementById("debug");
                        
                        if (result && result.length > 0) {
                            var r = result[0];
                            // Aquí sacamos la verdad:
                            res.innerHTML = "✅ RUTA ENCONTRADA";
                            debug.innerHTML = `
                                <p><span class="label">Nombre Oficial:</span> ${r.name}</p>
                                <p><span class="label">ID Interno:</span> ${r.id}</p>
                                <p><span class="label">¿Tiene paradas?:</span> ${r.routePlanItem ? 'SÍ (' + r.routePlanItem.length + ' puntos)' : 'NO (Viene como undefined)'}</p>
                                <p><span class="label">Comentario:</span> ${r.comment || 'Sin comentarios'}</p>
                            `;
                            
                            console.log("Objeto completo de la ruta:", r);
                        } else {
                            res.innerHTML = "❌ NO SE ENCONTRÓ NADA con el ID 'bB'.";
                        }
                        callback();
                    }, function(error) {
                        document.getElementById("res").innerHTML = "⚠️ Error de API: " + error;
                        callback();
                    });
                }
            };
        };
    </script>
</body>
</html>
