<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1000px; margin: auto; }
        .header-tools { display: flex; gap: 15px; margin-bottom: 20px; background: #e8f0fe; padding: 15px; border-radius: 8px; align-items: flex-end; border-left: 5px solid #1a73e8; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #1a73e8; color: white; padding: 10px 20px; height: 40px; }
        .btn-save { background: #28a745; color: white; padding: 12px 30px; float: right; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1a73e8; color: white; padding: 12px; text-align: center; }
        th:nth-child(2) { text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle; }
        td:nth-child(2) { text-align: left; }
        .input-edit { width: 80px; border: 2px solid #3498db; text-align: center; font-weight: bold; color: #1a73e8; padding: 5px; border-radius: 4px; display: inline-block; }
        .km-val { color: #666; font-family: monospace; font-weight: bold; }
        .delete-btn { color: #e74c3c; background: none; font-size: 18px; }
        .guion { color: #ccc; font-weight: bold; display: block; width: 100%; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛠️ Constructor de Ruta Inteligente (ARDEPE) V4</h2>
    
    <div class="header-tools">
        <div class="input-group">
            <label>Nombre de la Ruta:</label>
            <input type="text" id="nombreRuta" placeholder="Ej: LIMA - HUANCAVELICA" style="width: 220px;">
        </div>
        <div class="input-group">
            <label id="lblZonas">Cargando zonas...</label>
            <input list="listaZonas" id="buscadorZonas" placeholder="Escribe nombre de la zona..." style="width: 350px;">
            <datalist id="listaZonas"></datalist>
        </div>
        <button class="btn-add" id="btnAgregar">➕ Añadir Punto</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 50px;">Orden</th>
                <th>Punto de Control</th>
                <th style="width: 140px;">Distancia (Km)</th>
                <th style="width: 140px;">Tiempo Tramo (HH:mm)</th>
                <th style="width: 140px;">Pernocte (HH:mm)</th>
                <th style="width: 50px;">Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoRuta"></tbody>
    </table>

    <button class="btn-save" id="btnGuardar">💾 Guardar Ruta Maestra</button>
</div>

<script>
    let zonasFiltradas = [];
    let rutaActual = [];

    function formatTime(decimal) {
        if (!decimal || isNaN(decimal) || decimal <= 0) return "00:00";
        let h = Math.floor(decimal);
        let m = Math.round((decimal - h) * 60);
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    }

    function getHaversine(lat1, lon1, lat2, lon2) {
        if (lat1 === undefined || lon1 === undefined || lat2 === undefined || lon2 === undefined) return 0;
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    geotab.addin.configurar = (api, state) => {
        return {
            initialize(api, state, callback) {
                api.call("Get", {
                    typeName: "Zone",
                    search: { zoneTypeIds: ["b4A3"] }
                }, (result) => {
                    zonasFiltradas = result.filter(z => z.zoneTypes && z.zoneTypes.some(t => t.id === "b4A3"))
                                           .sort((a, b) => a.name.localeCompare(b.name));
                    
                    document.getElementById("lblZonas").innerText = `Escribe para buscar zona (${zonasFiltradas.length} disponibles):`;
                    const datalist = document.getElementById("listaZonas");
                    zonasFiltradas.forEach(z => {
                        let opt = document.createElement("option");
                        opt.value = z.name;
                        datalist.appendChild(opt);
                    });
                });

                document.getElementById("btnAgregar").addEventListener("click", () => {
                    const inputBusqueda = document.getElementById("buscadorZonas");
                    const zonaSel = zonasFiltradas.find(z => z.name === inputBusqueda.value);
                    
                    if (!zonaSel) return;

                    // BUSQUEDA DE COORDENADAS REFORZADA
                    let lat = 0, lon = 0;
                    if (zonaSel.center) {
                        lat = zonaSel.center.y;
                        lon = zonaSel.center.x;
                    } else if (zonaSel.points && zonaSel.points.length > 0) {
                        lat = zonaSel.points[0].y;
                        lon = zonaSel.points[0].x;
                    }

                    const previo = rutaActual[rutaActual.length - 1];
                    let km = 0;
                    if (previo && lat !== 0) {
                        km = getHaversine(previo.lat, previo.lon, lat, lon);
                    }

                    rutaActual.push({
                        name: zonaSel.name,
                        lat: lat,
                        lon: lon,
                        km: km,
                        tiempo: formatTime(km / 60)
                    });

                    inputBusqueda.value = "";
                    updateUI();
                });

                function updateUI() {
                    const cuerpo = document.getElementById("cuerpoRuta");
                    cuerpo.innerHTML = "";
                    rutaActual.forEach((item, i) => {
                        const row = cuerpo.insertRow();
                        const esPrimero = (i === 0);
                        
                        const distContenido = (esPrimero || item.km === 0) ? '<span class="guion">-</span>' : `<span class="km-val">${item.km.toFixed(2)} km</span>`;
                        const tiempoContenido = (esPrimero || item.km === 0) ? '<span class="guion">-</span>' : `<input type="text" class="input-edit" value="${item.tiempo}">`;
                        
                        row.innerHTML = `
                            <td>${i + 1}</td>
                            <td><strong>${item.name}</strong></td>
                            <td>${distContenido}</td>
                            <td>${tiempoContenido}</td>
                            <td><input type="text" class="input-edit" value="00:30"></td>
                            <td><button class="delete-btn" onclick="borrar(${i})">🗑️</button></td>
                        `;
                    });
                }

                window.borrar = (idx) => {
                    rutaActual.splice(idx, 1);
                    updateUI();
                };

                callback();
            }
        };
    };
</script>
</body>
</html>
