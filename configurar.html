<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: #00ff00; }
        .box { border: 2px solid #00ff00; padding: 20px; border-radius: 10px; }
        .dato { color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔍 VERIFICACIÓN DE RUTA</h2>
        <div id="resultado">Conectando con MyGeotab...</div>
    </div>

    <script>
        geotab.addin.configurar = (api, state) => {
            return {
                initialize(api, state, callback) {
                    api.call("Get", {
                        typeName: "Route",
                        search: { id: "bB" }
                    }, function(result) {
                        var res = document.getElementById("resultado");
                        
                        if (result && result.length > 0) {
                            var r = result[0];
                            var nombre = r.name || "Sin nombre";
                            // Usamos un bucle clásico de toda la vida, no forEach
                            var puntos = r.routePlanItem || [];
                            var totalPuntos = puntos.length;

                            res.innerHTML = `
                                <p>✅ RUTA ENCONTRADA</p>
                                <p>Nombre: <span class="dato">${nombre}</span></p>
                                <p>ID: <span class="dato">${r.id}</span></p>
                                <p>Total Geocercas: <span class="dato">${totalPuntos}</span></p>
                            `;
                        } else {
                            res.innerHTML = "❌ No existe la ruta con ID: bB";
                        }
                        callback();
                    }, function(err) {
                        document.getElementById("resultado").innerHTML = "⚠️ Error: " + err;
                        callback();
                    });
                }
            };
        };
    </script>
</body>
</html>
