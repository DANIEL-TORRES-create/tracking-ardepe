<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: sans-serif; padding: 10px; }
        .container { border: 1px solid #ccc; padding: 15px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        th { background: #3498db; color: white; }
        .loading-text { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h3>🛠️ 1. Configuración de Ruta Maestra</h3>
        <p id="info">Estado: <span class="loading-text">Buscando datos en MyGeotab...</span></p>
        
        <table id="miTabla" style="display:none;">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Punto de Control</th>
                    <th>Viaje (Min)</th>
                    <th>Pernocte (Min)</th>
                </tr>
            </thead>
            <tbody id="cuerpo"></tbody>
        </table>
        <button id="btn" style="margin-top:10px; display:none;">Guardar Configuración</button>
    </div>

    <script>
        geotab.addin.configurar = (api, state) => {
            return {
                initialize(api, state, callback) {
                    // Buscamos la ruta - Cambié la búsqueda para que sea más flexible
                    api.call("Get", {
                        typeName: "Route",
                        search: { name: "%LIMA - HUANCAVELICA%" } 
                    }, (rutas) => {
                        const info = document.getElementById("info");
                        if (rutas && rutas.length > 0) {
                            const puntos = rutas[0].routePlanItem;
                            const tabla = document.getElementById("miTabla");
                            const cuerpo = document.getElementById("cuerpo");
                            
                            puntos.forEach((p, i) => {
                                let row = cuerpo.insertRow();
                                row.innerHTML = `
                                    <td>${i + 1}</td>
                                    <td>${p.zone.name}</td>
                                    <td><input type="number" value="60" style="width:50px"></td>
                                    <td><input type="number" value="30" style="width:50px"></td>
                                `;
                            });
                            
                            info.innerHTML = "✅ Ruta conectada: <strong>" + rutas[0].name + "</strong>";
                            tabla.style.display = "table";
                            document.getElementById("btn").style.display = "block";
                        } else {
                            info.innerHTML = "❌ Error: No encontré la ruta. Revisa que el nombre en Geotab sea exacto.";
                        }
                        callback();
                    }, (error) => {
                        document.getElementById("info").innerHTML = "❌ Error de API: " + error;
                        callback();
                    });
                }
            };
        };
    </script>
</body>
</html>
