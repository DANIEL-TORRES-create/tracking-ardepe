<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="card-container">
    <h2 class="titulo-seccion">🛠️ Constructor de Ruta</h2>
    
    <div class="barra-herramientas">
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-weight: bold; font-size: 13px;">Nombre de la Ruta:</label>
            <input type="text" id="nombreRuta" placeholder="Ej: LIMA - HUANCAVELICA" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 220px;">
        </div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label id="lblZonas" style="font-weight: bold; font-size: 13px;">Buscando zonas...</label>
            <input list="listaZonas" id="buscadorZonas" placeholder="Escribe para buscar..." style="padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 350px;">
            <datalist id="listaZonas"></datalist>
        </div>
        <button id="btnAgregar" style="background: #1a73e8; color: white; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; height: 40px;">➕ Añadir Punto</button>
    </div>

    <table class="tabla-constructor">
        <thead>
            <tr>
                <th style="border-radius: 6px 0 0 0;">Orden</th>
                <th style="text-align: left;">Punto de Control</th>
                <th>Distancia (Km)</th>
                <th>Tiempo Tramo (HH:mm)</th>
                <th>Pernocte (HH:mm)</th>
                <th style="border-radius: 0 6px 0 0;">Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoRuta"></tbody>
    </table>

    <button id="btnGuardar" class="btn-guardar">💾 Guardar Ruta Maestra</button>
    <div style="clear: both;"></div>

    <div class="seccion-lista">
        <h3 style="color: #5c6bc0;">📂 Rutas Maestras Guardadas</h3>
        <table class="tabla-constructor">
            <thead>
                <tr>
                    <th style="background:#5c6bc0 !important;">Nombre de Ruta</th>
                    <th style="background:#5c6bc0 !important;">Puntos</th>
                    <th style="background:#5c6bc0 !important;">Fecha</th>
                    <th style="background:#5c6bc0 !important;">Acciones</th>
                </tr>
            </thead>
            <tbody id="listaRutasGuardadas"></tbody>
        </table>
    </div>
</div>

<script>
    let zonasFiltradas = [];
    let rutaActual = [];
    let rIdActual = null; 

    function formatTime(decimal) {
        if (!decimal || isNaN(decimal) || decimal <= 0) return "00:00";
        let h = Math.floor(decimal);
        let m = Math.round((decimal - h) * 60);
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    }

    function getHaversine(lat1, lon1, lat2, lon2) {
        if (lat1 === undefined || lon1 === undefined || lat2 === undefined || lon2 === undefined) return 0;
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    geotab.addin.configurar = (api, state) => {
        
        const cargarRutasExistentes = () => {
            api.call("Get", { typeName: "AddInData", search: { key: "RutaMaestra_ARDEPE" } }, (rutas) => {
                const listaUI = document.getElementById("listaRutasGuardadas");
                listaUI.innerHTML = "";
                rutas.forEach(r => {
                    const data = JSON.parse(r.data);
                    const row = listaUI.insertRow();
                    row.innerHTML = `
                        <td style="text-align:left; padding:10px;"><strong>${data.nombre}</strong></td>
                        <td>${data.puntos.length} pts</td>
                        <td>${new Date(data.fecha).toLocaleDateString()}</td>
                        <td>
                            <button class="btn-accion" onclick="editarRuta('${r.id}')">✏️</button>
                            <button class="btn-accion" onclick="eliminarRuta('${r.id}')">🗑️</button>
                        </td>
                    `;
                });
            });
        };

        return {
            initialize(api, state, callback) {
                // Cargar Zonas
                api.call("Get", {
                    typeName: "Zone",
                    search: { zoneTypeIds: ["b4A3"] }
                }, (result) => {
                    zonasFiltradas = result.filter(z => z.zoneTypes && z.zoneTypes.some(t => t.id === "b4A3"))
                                           .sort((a, b) => a.name.localeCompare(b.name));
                    document.getElementById("lblZonas").innerText = `Escribe zona (${zonasFiltradas.length} disp.):`;
                    const datalist = document.getElementById("listaZonas");
                    zonasFiltradas.forEach(z => {
                        let opt = document.createElement("option");
                        opt.value = z.name;
                        datalist.appendChild(opt);
                    });
                });

                cargarRutasExistentes();

                document.getElementById("btnAgregar").addEventListener("click", () => {
                    const inputNombre = document.getElementById("nombreRuta");
                    const inputBusqueda = document.getElementById("buscadorZonas");
                    if (!inputNombre.value.trim()) { alert("⚠️ Ingresa Nombre de Ruta."); inputNombre.focus(); return; }
                    
                    const zonaSel = zonasFiltradas.find(z => z.name === inputBusqueda.value);
                    if (!zonaSel) return;

                    let lat = 0, lon = 0;
                    if (zonaSel.center) { lat = zonaSel.center.y; lon = zonaSel.center.x; }
                    else if (zonaSel.y) { lat = zonaSel.y; lon = zonaSel.x; }
                    else if (zonaSel.points && zonaSel.points[0]) { lat = zonaSel.points[0].y; lon = zonaSel.points[0].x; }

                    const previo = rutaActual[rutaActual.length - 1];
                    let km = (previo && lat !== 0) ? getHaversine(previo.lat, previo.lon, lat, lon) : 0;

                    rutaActual.push({ name: zonaSel.name, lat: lat, lon: lon, km: km, tiempo: formatTime(km / 60) });
                    inputBusqueda.value = "";
                    updateUI();
                });

                document.getElementById("btnGuardar").addEventListener("click", () => {
                    const nombre = document.getElementById("nombreRuta").value.trim();
                    if (!nombre || rutaActual.length === 0) return alert("❌ Nombre o puntos faltantes");

                    const filas = document.querySelectorAll("#cuerpoRuta tr");
                    const puntosFinales = rutaActual.map((p, i) => ({
                        ...p,
                        tiempo: filas[i].querySelectorAll("input")[0]?.value || "00:00",
                        pernocte: filas[i].querySelectorAll("input")[1]?.value || "00:30"
                    }));

                    const entidad = {
                        key: "RutaMaestra_ARDEPE",
                        data: JSON.stringify({ nombre, puntos: puntosFinales, fecha: new Date().toISOString() })
                    };
                    if(rIdActual) entidad.id = rIdActual;

                    api.call(rIdActual ? "Set" : "Add", { typeName: "AddInData", entity: entidad }, () => {
                        alert("✅ Ruta guardada");
                        rIdActual = null;
                        document.getElementById("nombreRuta").value = "";
                        rutaActual = [];
                        updateUI();
                        cargarRutasExistentes();
                    });
                });

                window.editarRuta = (id) => {
                    api.call("Get", { typeName: "AddInData", search: { id: id } }, (res) => {
                        const r = JSON.parse(res[0].data);
                        rIdActual = id;
                        document.getElementById("nombreRuta").value = r.nombre;
                        rutaActual = r.puntos;
                        updateUI();
                        window.scrollTo(0,0);
                    });
                };

                window.eliminarRuta = (id) => {
                    if(confirm("¿Eliminar ruta maestra?")) {
                        api.call("Remove", { typeName: "AddInData", entity: { id: id } }, () => cargarRutasExistentes());
                    }
                };

                function updateUI() {
                    const cuerpo = document.getElementById("cuerpoRuta");
                    cuerpo.innerHTML = "";
                    rutaActual.forEach((item, i) => {
                        const row = cuerpo.insertRow();
                        const esPrimero = (i === 0);
                        row.innerHTML = `
                            <td>${i + 1}</td>
                            <td style="text-align: left; font-weight: bold;">${item.name}</td>
                            <td>${esPrimero ? '<span class="guion">-</span>' : '<span style="color:#333; font-weight:bold; font-size:13px;">' + parseFloat(item.km).toFixed(2) + ' km</span>'}</td>
                            <td>${esPrimero ? '<span class="guion">-</span>' : '<input type="text" class="input-tiempo" value="' + item.tiempo + '">'}</td>
                            <td><input type="text" class="input-tiempo" value="${item.pernocte || '00:30'}"></td>
                            <td><button onclick="borrar(${i})" style="color:#e74c3c; background:none; border:none; font-size:18px; cursor:pointer;">🗑️</button></td>
                        `;
                    });
                }

                window.borrar = (idx) => { rutaActual.splice(idx, 1); updateUI(); };
                callback();
            }
        };
    };
</script>
</body>
</html>
