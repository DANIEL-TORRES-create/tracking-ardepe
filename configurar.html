<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background-color: #f0f2f5;">

<div style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1000px; margin: auto;">
    
    <h2 style="color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; margin-top: 0;">🛠️ Constructor de Ruta</h2>
    
    <div style="display: flex; gap: 15px; margin-bottom: 20px; background: #e8f0fe; padding: 15px; border-radius: 8px; align-items: flex-end; border-left: 5px solid #1a73e8;">
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-weight: bold; font-size: 13px;">Nombre de la Ruta:</label>
            <input type="text" id="nombreRuta" placeholder="Ej: LIMA - HUANCAVELICA" style="padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 220px;">
        </div>
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label id="lblZonas" style="font-weight: bold; font-size: 13px;">Buscando zonas...</label>
            <input list="listaZonas" id="buscadorZonas" placeholder="Escribe para buscar..." style="padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 350px;">
            <datalist id="listaZonas"></datalist>
        </div>
        <button id="btnAgregar" style="background: #1a73e8; color: white; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; height: 40px;">➕ Añadir Punto</button>
    </div>

    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
        <thead>
            <tr style="background: #1a73e8; color: white;">
                <th style="padding: 12px; text-align: center; border-radius: 6px 0 0 0;">Orden</th>
                <th style="padding: 12px; text-align: left;">Punto de Control</th>
                <th style="padding: 12px; text-align: center;">Distancia (Km)</th>
                <th style="padding: 12px; text-align: center;">Tiempo Tramo (HH:mm)</th>
                <th style="padding: 12px; text-align: center;">Pernocte (HH:mm)</th>
                <th style="padding: 12px; text-align: center; border-radius: 0 6px 0 0;">Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoRuta"></tbody>
    </table>

    <button id="btnGuardar" style="background: #28a745; color: white; padding: 12px 30px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; float: right; margin-top: 20px;">💾 Guardar Ruta Maestra</button>
    <div style="clear: both;"></div>
</div>

<script>
    let zonasFiltradas = [];
    let rutaActual = [];

    function formatTime(decimal) {
        if (!decimal || isNaN(decimal) || decimal <= 0) return "00:00";
        let h = Math.floor(decimal);
        let m = Math.round((decimal - h) * 60);
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    }

    function getHaversine(lat1, lon1, lat2, lon2) {
        if (lat1 === undefined || lon1 === undefined || lat2 === undefined || lon2 === undefined) return 0;
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    geotab.addin.configurar = (api, state) => {
        return {
            initialize(api, state, callback) {
                api.call("Get", {
                    typeName: "Zone",
                    search: { zoneTypeIds: ["b4A3"] }
                }, (result) => {
                    zonasFiltradas = result.filter(z => z.zoneTypes && z.zoneTypes.some(t => t.id === "b4A3"))
                                           .sort((a, b) => a.name.localeCompare(b.name));
                    
                    document.getElementById("lblZonas").innerText = `Escribe zona (${zonasFiltradas.length} disp.):`;
                    const datalist = document.getElementById("listaZonas");
                    zonasFiltradas.forEach(z => {
                        let opt = document.createElement("option");
                        opt.value = z.name;
                        datalist.appendChild(opt);
                    });
                });

                document.getElementById("btnAgregar").addEventListener("click", () => {
                    const inputBusqueda = document.getElementById("buscadorZonas");
                    const zonaSel = zonasFiltradas.find(z => z.name === inputBusqueda.value);
                    if (!zonaSel) return;

                    let lat = (zonaSel.center) ? zonaSel.center.y : (zonaSel.y || 0);
                    let lon = (zonaSel.center) ? zonaSel.center.x : (zonaSel.x || 0);

                    const previo = rutaActual[rutaActual.length - 1];
                    let km = 0;
                    if (previo && lat !== 0) km = getHaversine(previo.lat, previo.lon, lat, lon);

                    rutaActual.push({ name: zonaSel.name, lat: lat, lon: lon, km: km, tiempo: formatTime(km / 60) });
                    inputBusqueda.value = "";
                    updateUI();
                });

                function updateUI() {
                    const cuerpo = document.getElementById("cuerpoRuta");
                    cuerpo.innerHTML = "";
                    rutaActual.forEach((item, i) => {
                        const row = cuerpo.insertRow();
                        const esPrimero = (i === 0);
                        
                        // Estilos de celda centrados
                        const cellStyle = "padding: 10px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle;";
                        const nameStyle = "padding: 10px; border-bottom: 1px solid #eee; text-align: left; font-weight: bold;";
                        const inputStyle = "width: 80px; border: 2px solid #3498db; text-align: center; font-weight: bold; color: #1a73e8; padding: 5px; border-radius: 4px;";

                        row.innerHTML = `
                            <td style="${cellStyle}">${i + 1}</td>
                            <td style="${nameStyle}">${item.name}</td>
                            <td style="${cellStyle}">${(esPrimero || item.km === 0) ? '-' : '<span style="color:#666; font-family:monospace;">' + item.km.toFixed(2) + ' km</span>'}</td>
                            <td style="${cellStyle}">${(esPrimero || item.km === 0) ? '-' : '<input type="text" style="' + inputStyle + '" value="' + item.tiempo + '">'}</td>
                            <td style="${cellStyle}"><input type="text" style="${inputStyle}" value="00:30"></td>
                            <td style="${cellStyle}"><button onclick="borrar(${i})" style="color: #e74c3c; background: none; border: none; font-size: 18px; cursor: pointer;">🗑️</button></td>
                        `;
                    });
                }

                window.borrar = (idx) => {
                    rutaActual.splice(idx, 1);
                    updateUI();
                };

                callback();
            }
        };
    };
</script>
</body>
</html>
