<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1100px; margin: auto; }
        .header-tools { display: flex; gap: 15px; margin-bottom: 20px; background: #e8f0fe; padding: 15px; border-radius: 8px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #1a73e8; color: white; padding: 10px 20px; }
        .btn-save { background: #28a745; color: white; padding: 12px 30px; float: right; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1a73e8; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .calc-val { color: #1a73e8; font-weight: bold; font-family: monospace; font-size: 15px; }
        .input-human { width: 90px; border: 2px solid #3498db; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛠️ Constructor de Rutas ARDEPE</h2>
    
    <div class="header-tools">
        <div class="input-group">
            <label>Nombre de la Nueva Ruta:</label>
            <input type="text" id="nombreRuta" placeholder="Ej: LIMA - HUANCAVELICA 2024" style="width: 250px;">
        </div>
        <div class="input-group">
            <label>Seleccionar Punto (Filtro Tipo b4A3):</label>
            <select id="selectorZonas" style="width: 300px;">
                <option value="">Cargando zonas...</option>
            </select>
        </div>
        <button class="btn-add" id="btnAgregar">➕ Agregar Punto</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Orden</th>
                <th>Zona / Punto</th>
                <th>Distancia (Km)</th>
                <th>Sistema (HH:mm)</th>
                <th>Ajuste Humano (HH:mm)</th>
                <th>Pernocte (HH:mm)</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoRuta"></tbody>
    </table>

    <button class="btn-save" id="btnGuardarFinal">💾 Guardar Ruta Maestra</button>
</div>

<script>
    let zonasMaestras = [];
    let rutaConstruida = [];

    // Formateador de decimales a HH:mm
    function decimalAHora(decimal) {
        let hrs = Math.floor(decimal);
        let mins = Math.round((decimal - hrs) * 60);
        return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    geotab.addin.configurar = (api, state) => {
        return {
            initialize(api, state, callback) {
                // Cargar zonas tipo b4A3 al selector
                api.call("Get", {
                    typeName: "Zone",
                    search: { zoneTypeIds: ["b4A3"] }
                }, (result) => {
                    zonasMaestras = result.sort((a, b) => a.name.localeCompare(b.name));
                    const select = document.getElementById("selectorZonas");
                    select.innerHTML = '<option value="">-- Seleccione una zona --</option>';
                    zonasMaestras.forEach(z => {
                        select.innerHTML += `<option value="${z.id}">${z.name}</option>`;
                    });
                });

                document.getElementById("btnAgregar").addEventListener("click", () => {
                    const select = document.getElementById("selectorZonas");
                    const zonaId = select.value;
                    if (!zonaId) return;

                    const zonaData = zonasMaestras.find(z => z.id === zonaId);
                    const puntoAnterior = rutaConstruida[rutaConstruida.length - 1];
                    
                    let dist = 0;
                    if (puntoAnterior) {
                        dist = calcularDistancia(puntoAnterior.y, puntoAnterior.x, zonaData.y, zonaData.x);
                    }

                    const tiempoEstimadoDecimal = dist / 60; // 60 km/h
                    const objPunto = {
                        ...zonaData,
                        distancia: dist,
                        tiempoHHmm: decimalAHora(tiempoEstimadoDecimal)
                    };

                    rutaConstruida.push(objPunto);
                    renderizarTabla();
                });

                function renderizarTabla() {
                    const cuerpo = document.getElementById("cuerpoRuta");
                    cuerpo.innerHTML = "";
                    rutaConstruida.forEach((p, i) => {
                        const row = cuerpo.insertRow();
                        row.innerHTML = `
                            <td>${i + 1}</td>
                            <td><strong>${p.name}</strong></td>
                            <td class="calc-val">${p.distancia.toFixed(2)} km</td>
                            <td class="calc-val">${p.tiempoHHmm}</td>
                            <td><input type="text" class="input-human" value="${p.tiempoHHmm}"></td>
                            <td><input type="text" class="input-human" value="00:30"></td>
                            <td><button onclick="eliminarPunto(${i})" style="color:red; background:none;">❌</button></td>
                        `;
                    });
                }

                window.eliminarPunto = (index) => {
                    rutaConstruida.splice(index, 1);
                    renderizarTabla();
                };

                callback();
            }
        };
    };
</script>

</body>
</html>
